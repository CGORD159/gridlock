<style>
/* ═══════════════════════════════════════════════
   COLOUR TOKENS — dark (default) & light
   ═══════════════════════════════════════════════ */
:root {
  --bg:#0a0a0f; --bg2:#0d0d16; --panel:#111118; --panel2:#161620;
  --border:#1e1e2e; --border2:#262638;
  --text:#f0f0ff; --text2:#c0c0e0; --muted:#4a4a6a; --muted2:#6a6a8a;
  --shadow:rgba(0,0,0,0.55); --scan:rgba(0,0,0,0.07);
  --c1:#ff2d55; --c2:#00e5ff; --c3:#ffe600; --c4:#39ff14; --c5:#ff6b00; --c6:#bf5af2;
  --gold:#ffd700; --tile:54px;
}
html[data-mode="light"] {
  /* backgrounds — warm white, clear panel separation */
  --bg:#f5f5fa; --bg2:#ebebf2; --panel:#ffffff; --panel2:#f0f0f8;
  /* borders — visible but not harsh */
  --border:#c0c0d8; --border2:#a8a8c8;
  /* text — deep navy, not pure black */
  --text:#0a0a20; --text2:#22224a; --muted:#5a5a80; --muted2:#7a7a9a;
  /* shadows / scanline — very subtle in light */
  --shadow:rgba(0,0,0,0.08); --scan:rgba(200,200,220,0.15);
  /* tile accent colours — vivid & high-contrast on white (WCAG AA) */
  --c1:#cc0033;   /* red — deep enough on white */
  --c2:#0066bb;   /* blue — distinct from bg */
  --c3:#bb6600;   /* amber/orange — replaces yellow which vanishes on white */
  --c4:#007700;   /* forest green — readable */
  --c5:#cc4400;   /* burnt orange */
  --c6:#7700cc;   /* purple */
  --gold:#996600;
  /* tile backgrounds in light mode need stronger base fill */
  --tile-alpha:0.18;
}

/* ═══════════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;overscroll-behavior:none;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);}

/* ═══════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════ */
header{width:100%;max-width:480px;padding:10px 16px 4px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:4px;
  background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.logo-badge{font-size:12px;vertical-align:super;margin-left:2px;display:none;-webkit-text-fill-color:initial;}
.logo-badge.show{display:inline;}
.hdr-right{display:flex;align-items:center;gap:5px;}
.coin-pill{display:flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--border);
  border-radius:20px;padding:5px 10px;cursor:pointer;transition:border-color .2s;}
.coin-pill:hover{border-color:var(--gold);}
.coin-amt{font-size:12px;color:var(--gold);font-weight:700;}
.ico-btn{background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:5px 8px;cursor:pointer;font-size:14px;color:var(--text);transition:border-color .2s;}
.ico-btn:hover{border-color:var(--c2);}

/* ═══════════════════════════════════════════════
   FEVER / BONUS BARS
   ═══════════════════════════════════════════════ */
.fever-wrap{width:100%;max-width:480px;padding:1px 16px 2px;display:none;}
.fever-wrap.show{display:block;}
.fever-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.fever-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#ff2d55,#ffe600,#ff6b00);
  transition:width .15s;animation:fPulse .7s ease-in-out infinite;}
@keyframes fPulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.6);}}
.fever-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:var(--c5);text-align:center;margin-top:1px;}

/* ═══════════════════════════════════════════════
   STATS ROW
   ═══════════════════════════════════════════════ */
.stats{width:100%;max-width:480px;padding:3px 16px 4px;display:flex;gap:5px;}
.sbox{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:5px 4px;text-align:center;position:relative;overflow:hidden;transition:background .3s,border-color .3s;}
.sbox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--c2));}
.slabel{font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:1px;}
.sval{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;}

/* ═══════════════════════════════════════════════
   TIMER
   ═══════════════════════════════════════════════ */
.timer-wrap{width:100%;max-width:480px;padding:0 16px 3px;}
.timer-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.timer-fill{height:100%;border-radius:3px;transition:width .1s linear,background .3s;
  background:linear-gradient(90deg,var(--c4),var(--c2));}
.timer-fill.urgent{background:linear-gradient(90deg,var(--c1),var(--c5));}
.timer-fill.critical{animation:tPulse .3s ease-in-out infinite;}
@keyframes tPulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ═══════════════════════════════════════════════
   HUD ROW
   ═══════════════════════════════════════════════ */
.hud-row{width:100%;max-width:480px;padding:0 16px 3px;display:flex;align-items:center;justify-content:space-between;}
.lives{display:flex;gap:3px;align-items:center;}
.life{font-size:16px;transition:all .3s;}
.life.lost{filter:grayscale(1);opacity:.2;transform:scale(.7);}
.target-text{font-size:10px;color:var(--muted);letter-spacing:1px;}
.target-num{color:var(--c3);font-weight:700;font-size:12px;}

/* ═══════════════════════════════════════════════
   MISSION TICKER
   ═══════════════════════════════════════════════ */
.mission-ticker{width:100%;max-width:480px;padding:0 16px 2px;}
.mtick{background:rgba(255,230,0,.05);border:1px solid rgba(255,230,0,.18);border-radius:8px;
  padding:4px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;}
.mtick:hover{border-color:rgba(255,230,0,.35);}
.mlabel{font-size:9px;color:var(--c3);letter-spacing:1px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.mprog{font-size:9px;color:var(--muted);}

/* ═══════════════════════════════════════════════
   COMBO BAR
   ═══════════════════════════════════════════════ */
.combo-bar{width:100%;max-width:480px;padding:2px 16px;display:flex;align-items:center;
  justify-content:space-between;min-height:34px;}
.combo-txt{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;color:var(--muted);transition:all .2s;}
.combo-txt.active{color:var(--c3);filter:drop-shadow(0 0 6px var(--c3));}
.combo-right{display:flex;align-items:center;gap:5px;}
.sel-cnt{font-size:10px;color:var(--muted);}
.streak-bdg{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--c5);display:none;}
.commit-btn{background:linear-gradient(135deg,var(--c1),var(--c5));border:none;border-radius:8px;
  padding:5px 11px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;
  color:#fff;cursor:pointer;opacity:.3;pointer-events:none;}
.commit-btn.ready{opacity:1;pointer-events:auto;animation:bPulse .9s ease-in-out infinite;}
@keyframes bPulse{0%,100%{box-shadow:0 0 0 rgba(255,45,85,0);}50%{box-shadow:0 0 14px rgba(255,45,85,.7);}}

/* ═══════════════════════════════════════════════
   GRID
   ═══════════════════════════════════════════════ */
.grid-wrap{width:100%;max-width:480px;padding:0 16px;display:flex;justify-content:center;}
#grid{display:grid;gap:5px;user-select:none;touch-action:none;}
.tile{width:var(--tile);height:var(--tile);border-radius:10px;cursor:pointer;position:relative;
  transition:transform .1s,box-shadow .15s;border:2px solid transparent;
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;}
.tile.selected{transform:scale(1.08);border-color:rgba(255,255,255,.8);z-index:2;
  box-shadow:0 0 14px currentColor,0 0 3px rgba(255,255,255,.5);}
.tile.chain-head{transform:scale(1.14);border-color:#fff;z-index:3;box-shadow:0 0 22px currentColor,0 0 8px #fff;}
.tile.clearing{animation:tBlast .38s forwards;pointer-events:none;}
.tile.hint-glow{animation:hPulse .55s ease-in-out 3;}
.tile.appearing{animation:tAppear .28s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0;}
.tile.frozen{outline:2px solid #00f0ff;filter:brightness(1.2);}
.tile.wild{animation:wildGlow .8s ease-in-out infinite alternate;}
@keyframes wildGlow{from{box-shadow:0 0 8px #fff;}to{box-shadow:0 0 20px #fff,0 0 6px var(--c3);}}
.tile.selected::after,.tile.chain-head::after{content:attr(data-num);position:absolute;top:-7px;right:-5px;
  background:#fff;color:#000;border-radius:50%;width:15px;height:15px;font-size:8px;font-weight:900;
  display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;z-index:4;}
@keyframes tBlast{0%{transform:scale(1.1);opacity:1;}45%{transform:scale(1.5);opacity:.5;}100%{transform:scale(0);opacity:0;}}
@keyframes hPulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 24px #fff;}}
@keyframes tAppear{0%{transform:scale(0) rotate(-15deg);opacity:0;}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}

/* Light mode: tiles need solid fills and dark text for readability */
html[data-mode="light"] .tile { color: #fff !important; font-weight:900; text-shadow:0 1px 3px rgba(0,0,0,0.5); }
html[data-mode="light"] .tile.selected { border-color:rgba(0,0,0,0.6) !important; box-shadow:0 0 0 3px rgba(0,0,0,0.2); }
html[data-mode="light"] .tile.chain-head { border-color:#000 !important; box-shadow:0 0 0 3px rgba(0,0,0,0.35); }
html[data-mode="light"] .tile.selected::after, html[data-mode="light"] .tile.chain-head::after { background:#000; color:#fff; }
html[data-mode="light"] .tile.frozen { outline:3px solid #0055cc; }
html[data-mode="light"] body::before { display:none; }
html[data-mode="light"] .sbox { box-shadow:0 2px 8px var(--shadow); }
html[data-mode="light"] .screen { box-shadow:none; }
html[data-mode="light"] .combo-txt.active { filter:none; font-weight:900; }
html[data-mode="light"] .commit-btn { color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.4); }
html[data-mode="light"] .chain-badge { text-shadow:0 2px 8px rgba(0,0,0,0.4); }

/* ═══════════════════════════════════════════════
   POWER-UPS
   ═══════════════════════════════════════════════ */
.powerups{width:100%;max-width:480px;padding:4px 16px 6px;display:flex;gap:5px;}
.pu-btn{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:all .15s;position:relative;overflow:hidden;}
.pu-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--pc,var(--c2));}
.pu-btn:hover{border-color:var(--pc,var(--c2));transform:translateY(-2px);}
.pu-ico{font-size:16px;} .pu-nm{font-size:7px;letter-spacing:1px;color:var(--muted);} .pu-cost{font-size:9px;color:var(--gold);font-weight:700;}

/* ═══════════════════════════════════════════════
   AD SLOT
   ═══════════════════════════════════════════════ */
.ad-slot{width:100%;max-width:480px;padding:0 16px 8px;}

/* ═══════════════════════════════════════════════
   BONUS ROUND FLASH
   ═══════════════════════════════════════════════ */
.bonus-overlay{position:fixed;inset:0;pointer-events:none;z-index:50;
  border:4px solid var(--c5);animation:bonusBorder .5s ease-in-out infinite alternate;display:none;}
.bonus-overlay.show{display:block;}
@keyframes bonusBorder{from{border-color:var(--c5);}to{border-color:var(--c3);}}

/* ═══════════════════════════════════════════════
   COIN RAIN
   ═══════════════════════════════════════════════ */
.coin-rain{position:fixed;pointer-events:none;z-index:400;font-size:18px;animation:coinFall 1.2s forwards;}
@keyframes coinFall{0%{opacity:1;transform:translateY(0) rotate(0);}
  100%{opacity:0;transform:translateY(120px) rotate(360deg);}}

/* ═══════════════════════════════════════════════
   CHAIN BADGE
   ═══════════════════════════════════════════════ */
.chain-badge{position:fixed;pointer-events:none;font-family:'Bebas Neue',sans-serif;font-size:64px;
  opacity:0;z-index:1000;transform:translateX(-50%);text-shadow:0 0 30px currentColor;
  animation:cPop .75s forwards;}
@keyframes cPop{0%{opacity:0;transform:translateX(-50%) scale(.4) translateY(0);}
  35%{opacity:1;transform:translateX(-50%) scale(1.2) translateY(-10px);}
  70%{opacity:1;transform:translateX(-50%) scale(1) translateY(-35px);}
  100%{opacity:0;transform:translateX(-50%) scale(.8) translateY(-70px);}}

/* ═══════════════════════════════════════════════
   LEVEL UP FLASH
   ═══════════════════════════════════════════════ */
.lvlup{position:fixed;top:36%;left:50%;transform:translateX(-50%);
  font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:6px;color:var(--c3);
  text-shadow:0 0 40px var(--c3);pointer-events:none;z-index:300;animation:lvlPop 1s forwards;}
@keyframes lvlPop{0%{opacity:0;transform:translateX(-50%) scale(.4);}
  40%{opacity:1;transform:translateX(-50%) scale(1.3);}70%{opacity:1;transform:translateX(-50%) scale(1);}
  100%{opacity:0;transform:translateX(-50%) scale(.9) translateY(-50px);}}

/* ═══════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════ */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:8px 14px;font-size:11px;color:var(--text);z-index:500;
  animation:toastAnim 2.2s forwards;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 20px var(--shadow);}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(8px);}
  12%,76%{opacity:1;transform:translateX(-50%) translateY(0);}
  100%{opacity:0;transform:translateX(-50%) translateY(-8px);}}

/* ═══════════════════════════════════════════════
   SCREENS
   ═══════════════════════════════════════════════ */
.screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;z-index:200;padding:18px 20px 28px;
  overflow-y:auto;transition:background .3s;}
.screen.hidden{display:none;}
.scr-title{font-family:'Bebas Neue',sans-serif;font-size:54px;letter-spacing:6px;margin-bottom:4px;
  text-align:center;flex-shrink:0;}
.scr-sub{font-size:10px;color:var(--muted);letter-spacing:3px;text-align:center;margin-bottom:14px;flex-shrink:0;}

.big-btn{background:linear-gradient(135deg,var(--c1),var(--c2));border:none;border-radius:12px;
  padding:12px 40px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;
  color:#fff;cursor:pointer;transition:all .15s;margin-bottom:8px;
  box-shadow:0 0 28px rgba(255,45,85,.25);width:100%;max-width:320px;flex-shrink:0;}
.big-btn:hover{transform:scale(1.03);}
.ghost-btn{background:transparent;border:1px solid var(--border);border-radius:10px;
  padding:9px 24px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;
  color:var(--muted);cursor:pointer;transition:all .15s;margin-bottom:7px;
  width:100%;max-width:320px;flex-shrink:0;}
.ghost-btn:hover{border-color:var(--c2);color:var(--c2);}

/* ── Start screen pieces ── */
.how-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;max-width:340px;margin-bottom:14px;flex-shrink:0;}
.how-item{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.how-icon{font-size:20px;margin-bottom:4px;} .how-text{font-size:9px;color:var(--muted);line-height:1.5;}
.daily-badge{background:linear-gradient(135deg,rgba(99,78,234,.12),rgba(0,229,255,.06));
  border:1px solid rgba(0,229,255,.22);border-radius:10px;padding:9px 12px;
  width:100%;max-width:340px;margin-bottom:10px;display:flex;align-items:center;gap:9px;flex-shrink:0;}
.daily-play-btn{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.28);border-radius:8px;
  padding:5px 11px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;
  color:var(--c2);cursor:pointer;white-space:nowrap;}
.daily-play-btn:hover{background:rgba(0,229,255,.2);}

/* ── Instructions ── */
.instr-sec{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;flex-shrink:0;}
.instr-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;margin-bottom:6px;}
.instr-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;}
.instr-ico{font-size:14px;min-width:20px;text-align:center;margin-top:2px;}
.instr-text{font-size:10px;color:var(--muted);line-height:1.6;}
.instr-text strong{color:var(--text);}
.mult-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.mult-chip{padding:2px 9px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:1px;}

/* ── Game Over ── */
.go-score{font-family:'Bebas Neue',sans-serif;font-size:76px;letter-spacing:4px;
  background:linear-gradient(135deg,var(--c3),var(--c1));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px;flex-shrink:0;}
.go-stats{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;justify-content:center;flex-shrink:0;}
.go-stat{text-align:center;}
.go-sv{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--c2);}
.go-sl{font-size:7px;color:var(--muted);letter-spacing:2px;}
.lvl-badge{display:inline-block;background:rgba(255,230,0,.08);border:1px solid var(--c3);
  border-radius:20px;padding:2px 12px;font-size:9px;color:var(--c3);letter-spacing:2px;margin-bottom:8px;flex-shrink:0;}
.new-best{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--c4);
  animation:glow 1s ease-in-out infinite alternate;margin-bottom:5px;flex-shrink:0;}
@keyframes glow{from{filter:drop-shadow(0 0 4px var(--c4));}to{filter:drop-shadow(0 0 16px var(--c4));}}
.doubler-banner{width:100%;max-width:310px;background:rgba(255,107,0,.08);border:1px solid var(--c5);
  border-radius:10px;padding:8px 14px;margin-bottom:8px;text-align:center;flex-shrink:0;}
.dbl-title{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--c5);letter-spacing:2px;}
.dbl-timer{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--c3);}

/* ── Streak protect ── */
.streak-protect{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--panel);border-top:2px solid var(--c5);
  padding:12px 18px;z-index:300;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.streak-protect.hidden{display:none;}
.sp-text{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--c5);letter-spacing:1px;}
.sp-sub{font-size:9px;color:var(--muted);}
.sp-cd{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--c3);}
.sp-btn{background:var(--c5);border:none;border-radius:8px;padding:6px 12px;
  font-family:'Bebas Neue',sans-serif;font-size:14px;color:#fff;cursor:pointer;white-space:nowrap;}
.sp-skip{background:transparent;border:1px solid var(--border);border-radius:8px;
  padding:5px 8px;font-size:9px;color:var(--muted);cursor:pointer;}

/* ── Missions ── */
.mission-card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;margin-bottom:7px;flex-shrink:0;display:flex;align-items:center;gap:11px;}
.mission-card.done{border-color:var(--c4);background:rgba(57,255,20,.04);}
.mc-body{flex:1;}
.mc-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.mc-desc{font-size:10px;color:var(--muted);}
.mc-bar{height:4px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden;}
.mc-fill{height:100%;background:var(--c4);border-radius:2px;transition:width .4s;}
.mc-reward{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--gold);}

/* ── Achievements ── */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;max-width:380px;margin-bottom:10px;flex-shrink:0;}
.ach-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.ach-card.unlocked{border-color:var(--gold);}
.ach-card.locked{opacity:.4;}
.ach-icon{font-size:22px;margin-bottom:4px;}
.ach-name{font-size:9px;font-weight:700;color:var(--text);letter-spacing:1px;margin-bottom:2px;}
.ach-desc{font-size:8px;color:var(--muted);}
.ach-date{font-size:8px;color:var(--gold);margin-top:2px;}
/* ── Achievement TOAST (corner slide-in — game continues underneath) ── */
.ach-new{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(120px);
  background:linear-gradient(135deg,rgba(15,15,25,.96),rgba(25,20,40,.96));
  border:1px solid var(--gold);border-radius:16px;
  padding:12px 18px;z-index:350;pointer-events:none;
  display:flex;align-items:center;gap:12px;max-width:340px;width:90%;
  box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 20px rgba(255,215,0,.15);
  animation:achSlideIn 3.2s forwards;}
@keyframes achSlideIn{
  0%{transform:translateX(-50%) translateY(120px);opacity:0;}
  12%{transform:translateX(-50%) translateY(0);opacity:1;}
  75%{transform:translateX(-50%) translateY(0);opacity:1;}
  100%{transform:translateX(-50%) translateY(120px);opacity:0;}}
.ach-new-icon{font-size:36px;flex-shrink:0;}
.ach-new-body{display:flex;flex-direction:column;gap:2px;min-width:0;}
.ach-new-label{font-size:9px;color:var(--gold);letter-spacing:2px;font-family:'Space Mono',monospace;}
.ach-new-name{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;letter-spacing:2px;line-height:1.1;}
.ach-new-desc{font-size:10px;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── Stats screen ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;max-width:380px;margin-bottom:10px;flex-shrink:0;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.sc-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--c2);}
.sc-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;}
.score-chart{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:12px;margin-bottom:10px;flex-shrink:0;}

/* ── Store ── */
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;max-width:340px;margin-bottom:10px;flex-shrink:0;}
.store-item{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:11px 8px;text-align:center;cursor:pointer;transition:all .15s;position:relative;}
.store-item:hover{border-color:var(--gold);transform:translateY(-2px);}
.store-item.featured{border-color:var(--c1);background:rgba(255,45,85,.05);}
.dbl-tag{position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  background:var(--c5);color:#fff;font-size:7px;font-weight:700;padding:2px 8px;border-radius:10px;display:none;}
.dbl-tag.show{display:block;}
.store-coins{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);}
.store-price{font-size:12px;font-weight:700;color:var(--text);margin:2px 0;}
.store-note{font-size:8px;color:var(--muted);letter-spacing:1px;}
.store-badge{font-size:8px;color:var(--c1);font-weight:700;letter-spacing:1px;margin-bottom:2px;}
.free-section{width:100%;max-width:340px;background:rgba(40,224,0,.04);
  border:1px solid rgba(40,224,0,.2);border-radius:12px;padding:11px;margin-bottom:10px;flex-shrink:0;}
.fcol{display:flex;gap:6px;}
.fc-btn{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;}
.fc-btn:hover{border-color:var(--c4);}
.fc-ico{font-size:17px;margin-bottom:2px;}
.fc-coins{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--c4);}
.fc-lbl{font-size:7px;color:var(--muted);}
.fc-cd{font-size:8px;color:var(--muted);margin-top:1px;}

/* ── Theme row ── */
.theme-row{display:flex;gap:5px;flex-wrap:wrap;width:100%;max-width:340px;margin-bottom:10px;flex-shrink:0;}
.theme-btn{flex:1;min-width:58px;background:var(--panel);border:2px solid var(--border);border-radius:10px;
  padding:7px 4px;text-align:center;cursor:pointer;transition:all .15s;}
.theme-btn:hover{transform:translateY(-2px);}
.theme-btn.active-theme{border-color:var(--gold);}
.t-swatch{width:26px;height:26px;border-radius:5px;margin:0 auto 3px;}
.t-name{font-size:7px;color:var(--muted);letter-spacing:1px;}
.t-price{font-size:8px;color:var(--gold);font-weight:700;}

/* ── Coin Chest ── */
.chest-wrap{width:100%;max-width:340px;background:rgba(255,215,0,.05);
  border:1px solid rgba(255,215,0,.25);border-radius:12px;padding:11px;margin-bottom:10px;flex-shrink:0;text-align:center;}
.chest-icon{font-size:40px;cursor:pointer;transition:transform .15s;display:inline-block;}
.chest-icon:hover{transform:scale(1.15);}

/* ── Challenge banner ── */
.challenge-banner{width:100%;max-width:340px;background:rgba(0,229,255,.05);
  border:1px solid rgba(0,229,255,.25);border-radius:10px;padding:9px 12px;
  margin-bottom:10px;text-align:center;flex-shrink:0;}
.cb-title{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--c2);letter-spacing:2px;}
.cb-score{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--c3);}

/* ── Weekly leaderboard ── */
.lb-row{display:flex;align-items:center;gap:10px;width:100%;max-width:380px;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;margin-bottom:6px;flex-shrink:0;}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);min-width:28px;}
.lb-name{font-size:11px;font-weight:700;color:var(--text);flex:1;}
.lb-score{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--c2);}
.lb-you{border-color:var(--c3);}

/* ── VIP banner ── */
.vip-banner{width:100%;max-width:340px;background:linear-gradient(135deg,rgba(191,90,242,.12),rgba(255,215,0,.08));
  border:1px solid rgba(191,90,242,.35);border-radius:12px;padding:12px 14px;
  margin-bottom:10px;text-align:center;flex-shrink:0;}
.vip-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--c6);letter-spacing:3px;}
.vip-price{font-size:12px;color:var(--text);margin:4px 0;}
.vip-perks{font-size:9px;color:var(--muted);line-height:1.7;}
.vip-btn{background:var(--c6);border:none;border-radius:8px;padding:8px 22px;
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:#fff;cursor:pointer;margin-top:8px;}

/* ── Game Over nav buttons ── */
.go-nav-btn{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;transition:all .15s;font-family:'Bebas Neue',sans-serif;font-size:12px;
  letter-spacing:1px;color:var(--text);}
.go-nav-btn:hover{border-color:var(--c2);color:var(--c2);transform:translateY(-2px);}
.go-nav-btn span:first-child{font-size:20px;}

/* ── Profile screen ── */
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--c1),var(--c6));
  display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 8px;
  border:2px solid var(--border);}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--text);text-align:center;}
.profile-tag{font-size:9px;color:var(--muted);letter-spacing:2px;text-align:center;margin-bottom:12px;}
.profile-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;width:100%;max-width:380px;margin-bottom:10px;}
.ps-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
.ps-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--c2);}
.ps-lbl{font-size:7px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.profile-edit-btn{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:7px 18px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
  cursor:pointer;margin-bottom:10px;letter-spacing:1px;}
.profile-edit-btn:hover{border-color:var(--c2);color:var(--c2);}
.profile-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;font-family:'Space Mono',monospace;font-size:13px;color:var(--text);
  width:100%;max-width:280px;outline:none;text-align:center;margin-bottom:8px;}
.profile-input:focus{border-color:var(--c2);}
.profile-save-btn{background:var(--c2);border:none;border-radius:8px;padding:8px 24px;
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:#000;cursor:pointer;margin-bottom:12px;}

/* ── Puzzle screen ── */
.puzzle-tier-tab{display:flex;gap:4px;width:100%;max-width:440px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.pt-tab{flex:0 0 auto;padding:5px 12px;border-radius:20px;border:1px solid var(--border);
  font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;color:var(--muted);
  cursor:pointer;white-space:nowrap;transition:all .15s;}
.pt-tab.active{color:#000;border-color:transparent;}
.pt-tab[data-tier="bronze"].active{background:#cd7f32;}
.pt-tab[data-tier="silver"].active{background:#c0c0c0;}
.pt-tab[data-tier="gold"].active{background:#ffd700;}
.pt-tab[data-tier="platinum"].active{background:#e5e4e2;color:#333;}
.pt-tab[data-tier="vip"].active{background:linear-gradient(135deg,#bf5af2,#ffd700);color:#fff;}

.puzzle-card{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--border);
  border-radius:14px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden;}
.puzzle-card.locked{opacity:.6;}
.puzzle-tier-badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:20px;letter-spacing:1px;}
.puzzle-card-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--text);margin-bottom:4px;}
.puzzle-preview{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin:8px 0;max-width:196px;}
.puzzle-piece-cell{width:24px;height:24px;border-radius:3px;transition:all .2s;}
.piece-filled{opacity:1;}
.piece-empty{opacity:.15;background:var(--border)!important;}
.puzzle-progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:6px 0;}
.puzzle-progress-fill{height:100%;border-radius:3px;transition:width .4s;}
.puzzle-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.puzzle-pieces-text{font-size:9px;color:var(--muted);letter-spacing:1px;}
.puzzle-buy-btn{padding:5px 12px;border-radius:8px;border:none;font-family:'Bebas Neue',sans-serif;
  font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.puzzle-completed-seal{position:absolute;bottom:10px;right:14px;font-size:28px;opacity:.8;}

/* ── Puzzle collection gallery ── */
.puzzle-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:440px;margin-bottom:10px;}
.pg-item{background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:8px;text-align:center;cursor:pointer;transition:all .15s;}
.pg-item:hover{transform:translateY(-2px);border-color:var(--gold);}
.pg-item.completed{border-color:var(--gold);}
.pg-item img,.pg-item .pg-canvas{width:100%;aspect-ratio:1;border-radius:6px;display:block;}
.pg-label{font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:4px;}

/* ══════════════════════════════════════
   HOME SCREEN — v7 redesign
   ══════════════════════════════════════ */

/* Hero section */
.home-hero{width:100%;max-width:480px;padding:20px 20px 6px;text-align:center;position:relative;}
.home-logo{font-family:'Bebas Neue',sans-serif;font-size:80px;letter-spacing:8px;line-height:1;
  background:linear-gradient(135deg,var(--c1) 0%,var(--c2) 50%,var(--c6) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logoPulse 4s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 20px rgba(0,229,255,.2));}
  50%{filter:drop-shadow(0 0 40px rgba(255,45,85,.35));}}
.home-tagline{font-size:10px;color:var(--muted2);letter-spacing:5px;margin-top:2px;}
.home-hi{font-size:11px;color:var(--gold);letter-spacing:1px;margin-top:8px;min-height:16px;}

/* Play button — big vibrant CTA */
.home-play-btn{width:calc(100% - 32px);max-width:440px;margin:10px 16px 8px;
  background:linear-gradient(135deg,var(--c1) 0%,var(--c5) 60%,var(--c3) 100%);
  border:none;border-radius:20px;padding:20px 24px;
  font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:5px;color:#fff;
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 6px 28px rgba(255,45,85,.4),0 2px 8px rgba(0,0,0,.3);
  transition:transform .15s,box-shadow .15s;text-shadow:0 2px 8px rgba(0,0,0,.3);}
.home-play-btn:hover,.home-play-btn:active{transform:scale(1.03);box-shadow:0 10px 40px rgba(255,45,85,.55);}
.home-play-btn::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:rgba(255,255,255,.12);pointer-events:none;border-radius:20px 20px 0 0;}
.home-play-btn::before{content:'▶';position:absolute;right:22px;top:50%;transform:translateY(-50%);
  font-size:20px;opacity:.6;}

/* Daily challenge card */
.home-daily{width:calc(100% - 32px);max-width:440px;margin:0 16px 8px;
  background:linear-gradient(135deg,rgba(0,229,255,.1),rgba(191,90,242,.07));
  border:1px solid rgba(0,229,255,.3);border-radius:16px;
  padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:border-color .2s,transform .15s,box-shadow .2s;
  box-shadow:0 2px 12px rgba(0,229,255,.08);}
.home-daily:hover{border-color:rgba(0,229,255,.6);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,229,255,.15);}
.home-daily-icon{font-size:30px;flex-shrink:0;}
.home-daily-body{flex:1;}
.home-daily-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--c2);}
.home-daily-sub{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.home-daily-btn{font-family:'Bebas Neue',sans-serif;font-size:14px;color:#000;
  background:var(--c2);border:none;border-radius:10px;
  padding:8px 16px;cursor:pointer;white-space:nowrap;letter-spacing:1px;
  box-shadow:0 2px 8px rgba(0,229,255,.3);}

/* Stats strip — 4 boxes */
.home-stats-strip{width:calc(100% - 32px);max-width:440px;margin:0 16px 8px;display:flex;gap:6px;}
.hss-box{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:10px 6px;text-align:center;position:relative;overflow:hidden;
  transition:transform .15s;}
.hss-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--hc,var(--c2));}
.hss-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--hc,var(--c2));line-height:1;}
.hss-lbl{font-size:7px;color:var(--muted);letter-spacing:1px;margin-top:2px;}

/* Global top score card */
.home-world-card{width:calc(100% - 32px);max-width:440px;margin:0 16px 8px;
  background:linear-gradient(135deg,rgba(255,215,0,.07),rgba(255,107,0,.04));
  border:1px solid rgba(255,215,0,.25);border-radius:14px;
  padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:border-color .2s;}
.home-world-card:hover{border-color:rgba(255,215,0,.5);}
.hwc-icon{font-size:22px;}
.hwc-body{flex:1;}
.hwc-label{font-size:8px;color:var(--gold);letter-spacing:2px;}
.hwc-name{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text);letter-spacing:1px;}
.hwc-score{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);}

/* Nav grid — 2-column coloured cards */
.home-nav{width:calc(100% - 32px);max-width:440px;margin:0 16px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.home-nav-btn{background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:14px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:border-color .2s,transform .15s,background .2s;position:relative;overflow:hidden;}
.home-nav-btn::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--nc,var(--c2));}
.home-nav-btn:hover{border-color:var(--nc,var(--c2));transform:translateY(-2px);background:var(--panel2);}
.hnb-icon{font-size:24px;flex-shrink:0;margin-left:4px;}
.hnb-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--text);}
.hnb-sub{font-size:8px;color:var(--muted);margin-top:2px;}

/* Tips pills row */
.home-tips{width:calc(100% - 32px);max-width:440px;margin:8px 16px 6px;
  display:flex;flex-wrap:wrap;gap:5px;}
.tip-pill{background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:5px 11px;font-size:9px;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap;}
.tip-pill span{color:var(--text2);}

/* Footer */
.home-footer{width:100%;max-width:440px;padding:4px 16px 14px;
  display:flex;justify-content:center;gap:16px;flex-wrap:wrap;}
.home-footer a,.home-footer button{font-size:9px;color:var(--muted);letter-spacing:1px;
  background:none;border:none;cursor:pointer;text-decoration:none;padding:2px 0;transition:color .15s;}
.home-footer a:hover,.home-footer button:hover{color:var(--text);}

/* Light mode home overrides */
html[data-mode="light"] .home-play-btn{box-shadow:0 6px 24px rgba(204,0,51,.35);}
html[data-mode="light"] .home-daily{background:linear-gradient(135deg,rgba(0,102,187,.07),rgba(119,0,204,.04));}
html[data-mode="light"] .home-nav-btn,.home-world-card,.hss-box{box-shadow:0 2px 8px var(--shadow);}
html[data-mode="light"] .home-logo{filter:none !important;animation:none;}

/* ── Share card ── */
.share-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:12px;width:100%;max-width:340px;margin-bottom:8px;flex-shrink:0;text-align:center;}
.share-grid{display:flex;flex-direction:column;gap:2px;align-items:center;margin:8px 0;font-size:16px;letter-spacing:2px;line-height:1.5;font-family:monospace;}
.share-title{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--c2);letter-spacing:2px;margin-bottom:4px;}

/* ── Colour blind toggle ── */
html[data-cb="on"] .tile{font-size:14px !important;font-weight:900 !important;}
html[data-cb="on"] .tile::before{content:attr(data-sym);position:absolute;font-size:11px;bottom:3px;right:4px;opacity:0.9;}

/* ── Speed run mode ── */
.speedrun-badge{position:fixed;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(255,230,0,0.9);color:#000;font-family:'Bebas Neue',sans-serif;
  font-size:13px;letter-spacing:2px;padding:4px 14px;border-radius:20px;z-index:100;
  display:none;pointer-events:none;}
.speedrun-badge.show{display:block;}

/* ── Particle burst ── */
.particle{position:fixed;pointer-events:none;z-index:450;border-radius:50%;
  animation:particleFly 0.8s forwards;}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}}

/* ── Today's top score strip ── */
.top-score-strip{width:100%;max-width:480px;padding:0 16px 3px;}
.tss-inner{background:linear-gradient(90deg,rgba(255,215,0,.06),rgba(255,215,0,.02));
  border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:4px 10px;
  display:flex;align-items:center;justify-content:space-between;}

/* ── Combo meter bar ── */
.combo-meter-wrap{width:100%;max-width:480px;padding:0 16px 3px;display:flex;align-items:center;gap:8px;}
.combo-meter-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.combo-meter-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--c3),var(--c1));transition:width .2s;}
.combo-meter-labels{display:flex;justify-content:space-between;width:100%;max-width:480px;padding:0 16px;margin-top:-2px;}
.cml{font-size:7px;color:var(--muted);}

/* ── Score milestone flash ── */
.milestone-pop{position:fixed;top:38%;left:50%;transform:translateX(-50%);
  font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;
  pointer-events:none;z-index:350;animation:msPop .9s forwards;white-space:nowrap;}
@keyframes msPop{0%{opacity:0;transform:translateX(-50%) scale(.3) translateY(0);}
  35%{opacity:1;transform:translateX(-50%) scale(1.2) translateY(-10px);}
  65%{opacity:1;transform:translateX(-50%) scale(1) translateY(-25px);}
  100%{opacity:0;transform:translateX(-50%) scale(.8) translateY(-55px);}}

/* ── Confetti ── */
.confetti-piece{position:fixed;pointer-events:none;z-index:500;width:8px;height:8px;
  animation:confettiFall var(--dur) forwards ease-in;}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) translateX(0);}
  100%{opacity:0;transform:translateY(var(--fy)) rotate(var(--fr)) translateX(var(--fx));}}

/* ── Pause overlay ── */
.pause-overlay{position:fixed;inset:0;background:rgba(10,10,15,.88);z-index:600;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.pause-overlay.hidden{display:none;}
.pause-title{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:8px;
  color:var(--c2);text-shadow:0 0 40px var(--c2);}

/* ── Level intro flash ── */
.level-intro{position:fixed;inset:0;background:rgba(10,10,15,.85);z-index:550;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  animation:introFade 1.4s forwards;pointer-events:none;}
@keyframes introFade{0%,5%{opacity:0;}20%,70%{opacity:1;}100%{opacity:0;}}
.li-level{font-family:'Bebas Neue',sans-serif;font-size:68px;color:var(--c3);letter-spacing:6px;}
.li-goal{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);letter-spacing:3px;}
.li-time{font-size:11px;color:var(--muted2);}

/* ── Next-colour hint dots ── */
.next-hint{width:100%;max-width:480px;padding:0 16px 4px;display:flex;align-items:center;gap:5px;}
.nh-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.nh-label{font-size:8px;color:var(--muted);letter-spacing:1px;}
.tss-label{font-size:8px;color:var(--gold);letter-spacing:2px;}
.tss-score{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);}
.tss-name{font-size:9px;color:var(--muted);}

@media(max-width:360px){:root{--tile:48px;}}
@media(max-width:320px){:root{--tile:42px;}}

/* ═══════════════════════════════════════════════
   DESKTOP CENTRING — keeps 480px game column
   centred on any screen wider than 520px
   ═══════════════════════════════════════════════ */
/* ── Desktop centering: constrain all in-flow game elements to 480px column ── */
header,
.fever-wrap,.stats,.timer-wrap,.hud-row,.combo-meter-wrap,.next-hint,
.mission-ticker,.combo-bar,.grid-wrap,.powerups,.bonus-overlay,
.top-score-strip,.speedrun-badge,.ad-slot,
.bb-badge{
  width:100%;
  max-width:480px;
  margin-left:auto;
  margin-right:auto;
}
/* Screens stay full-width on mobile, centred column on desktop */
@media(min-width:520px){
  body{background:#0a0a14;}
  .screen{left:50%;transform:translateX(-50%);width:480px;max-width:480px;}
  .pause-overlay{left:50%;transform:translateX(-50%);width:480px;}
}

/* ═══════════════════════════════════════════════
   XP / RANK SYSTEM
   ═══════════════════════════════════════════════ */
.xp-bar-wrap{width:100%;max-width:440px;margin:0 0 8px;padding:0 4px;}
.xp-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.xp-rank-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;}
.xp-next{font-size:8px;color:var(--muted);letter-spacing:1px;}
.xp-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.xp-fill{height:100%;border-radius:2px;transition:width .6s ease;
  background:linear-gradient(90deg,var(--c6),var(--c2));}

/* ═══════════════════════════════════════════════
   STREAK REWARD CALENDAR
   ═══════════════════════════════════════════════ */
.streak-cal{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--border);
  border-radius:14px;padding:12px 14px;margin-bottom:8px;}
.sc-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--c3);margin-bottom:8px;}
.sc-days{display:flex;gap:4px;}
.sc-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 2px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);}
.sc-day.done{background:rgba(57,255,20,.08);border-color:var(--c4);}
.sc-day.today{border-color:var(--c3);background:rgba(255,230,0,.06);}
.sc-day.future{opacity:.45;}
.sc-d-num{font-size:8px;color:var(--muted);letter-spacing:1px;}
.sc-d-ico{font-size:14px;}
.sc-d-coins{font-size:7px;color:var(--gold);font-weight:700;}

/* ═══════════════════════════════════════════════
   REFERRAL SYSTEM
   ═══════════════════════════════════════════════ */
.referral-card{width:100%;max-width:440px;background:linear-gradient(135deg,rgba(0,229,255,.05),rgba(191,90,242,.04));
  border:1px solid rgba(0,229,255,.2);border-radius:14px;padding:13px 14px;margin-bottom:8px;}
.ref-code-box{display:flex;align-items:center;gap:8px;margin:8px 0;}
.ref-code{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:6px;
  color:var(--c2);background:var(--bg2);padding:6px 14px;border-radius:8px;
  border:1px solid var(--border);flex:1;text-align:center;}
.ref-copy-btn{background:var(--c2);border:none;border-radius:8px;padding:8px 14px;
  font-family:'Bebas Neue',sans-serif;font-size:13px;color:#000;cursor:pointer;white-space:nowrap;}

/* ═══════════════════════════════════════════════
   QUICK-TIPS TUTORIAL OVERLAY (first play)
   ═══════════════════════════════════════════════ */
.tutorial-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:800;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;}
.tutorial-card{background:var(--panel);border:1px solid var(--border2);border-radius:18px;
  padding:24px 20px;width:100%;max-width:360px;text-align:center;}
.tut-icon{font-size:48px;margin-bottom:10px;}
.tut-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;
  color:var(--c2);margin-bottom:6px;}
.tut-body{font-size:11px;color:var(--text2);line-height:1.7;margin-bottom:16px;}
.tut-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
.tut-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .2s;}
.tut-dot.active{background:var(--c2);}
.tut-next-btn{background:linear-gradient(135deg,var(--c1),var(--c2));border:none;border-radius:10px;
  padding:10px 32px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;
  color:#fff;cursor:pointer;width:100%;}

/* ═══════════════════════════════════════════════
   SEASON BANNER on home screen
   ═══════════════════════════════════════════════ */
.season-banner{width:100%;max-width:440px;border-radius:12px;padding:10px 14px;margin:0 0 8px;
  display:flex;align-items:center;gap:10px;cursor:pointer;overflow:hidden;position:relative;}
.sb-emoji{font-size:28px;flex-shrink:0;}
.sb-body{flex:1;}
.sb-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;}
.sb-sub{font-size:9px;opacity:.7;margin-top:1px;}
.sb-days{font-family:'Bebas Neue',sans-serif;font-size:13px;white-space:nowrap;opacity:.8;}
</head>
<body>

<!-- ═══════════ HOME SCREEN ═══════════ -->
<div class="screen" id="startScreen" style="padding:0;align-items:stretch;gap:0;">

  <!-- Hero -->
  <div class="home-hero">
    <div class="home-logo">GRIDLOCK<span id="logoBadge" class="logo-badge" style="-webkit-text-fill-color:initial;">👑</span></div>
    <div class="home-tagline">CHAIN · CLEAR · CONQUER</div>
    <div class="home-hi" id="startHiScore"></div>
  </div>

  <!-- Challenge banner (shown if arriving via challenge URL) -->
  <div id="challengeBannerStart" class="challenge-banner hidden" style="margin:0 16px 6px;"></div>

  <!-- Big PLAY button -->
  <button class="home-play-btn" onclick="onPlayNowTap()">PLAY NOW</button>

  <!-- Daily challenge card -->
  <div class="home-daily" onclick="startGame(true)">
    <div class="home-daily-icon">📅</div>
    <div class="home-daily-body">
      <div class="home-daily-title">DAILY CHALLENGE</div>
      <div class="home-daily-sub" id="dailySubText">TODAY'S UNIQUE GRID · SAME FOR EVERYONE</div>
    </div>
    <button class="home-daily-btn" onclick="event.stopPropagation();startGame(true)">PLAY</button>
  </div>

  <!-- Personal stats strip -->
  <div class="home-stats-strip">
    <div class="hss-box" style="--hc:var(--c1)">
      <div class="hss-val" id="homeHiScore">—</div>
      <div class="hss-lbl">HIGH SCORE</div>
    </div>
    <div class="hss-box" style="--hc:var(--c5)">
      <div class="hss-val" id="homeStreak">—</div>
      <div class="hss-lbl">DAY STREAK</div>
    </div>
    <div class="hss-box" style="--hc:var(--gold)">
      <div class="hss-val" id="homeCoinsHome">—</div>
      <div class="hss-lbl">COINS</div>
    </div>
    <div class="hss-box" style="--hc:var(--c4)">
      <div class="hss-val" id="homeGamesPlayed">—</div>
      <div class="hss-lbl">GAMES</div>
    </div>
  </div>

  <!-- XP / Rank bar -->
  <div style="padding:0 16px;width:100%;box-sizing:border-box;margin-bottom:6px;">
    <div class="xp-bar-wrap" style="margin:0;">
      <div class="xp-bar-top">
        <span class="xp-rank-label" id="homeRankLabel" style="color:var(--c6);">🎮 ROOKIE</span>
        <span class="xp-next" id="homeXpNext">0 XP</span>
      </div>
      <div class="xp-track"><div class="xp-fill" id="homeXpFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Season banner -->
  <div id="homeSeasonBanner" class="season-banner" style="margin:0 16px 6px;width:auto;" onclick="showScreen('storeScreen')"></div>

  <!-- Global top score -->
  <div class="home-world-card" onclick="showScreen('leaderboardScreen')" id="homeWorldCard" style="display:none;">
    <div class="hwc-icon">🌍</div>
    <div class="hwc-body">
      <div class="hwc-label">WORLD TOP SCORE</div>
      <div class="hwc-name" id="hwcName">Loading…</div>
    </div>
    <div class="hwc-score" id="hwcScore">—</div>
  </div>

  <!-- Streak Reward Calendar -->
  <div style="padding:0 16px;width:100%;box-sizing:border-box;margin-bottom:6px;">
    <div class="streak-cal">
      <div class="sc-title">🔥 7-DAY LOGIN REWARDS</div>
      <div class="sc-days" id="streakCalDays"></div>
    </div>
  </div>

  <!-- Nav grid — coloured per section -->
  <div class="home-nav">
    <button class="home-nav-btn" style="--nc:var(--gold)" onclick="showScreen('leaderboardScreen')">
      <div class="hnb-icon">🏆</div>
      <div class="hnb-body"><div class="hnb-title">LEADERBOARD</div><div class="hnb-sub">Global rankings</div></div>
    </button>
    <button class="home-nav-btn" style="--nc:var(--c3)" onclick="showScreen('storeScreen')">
      <div class="hnb-icon">🪙</div>
      <div class="hnb-body"><div class="hnb-title">COIN STORE</div><div class="hnb-sub">Power-ups & VIP</div></div>
    </button>
    <button class="home-nav-btn" style="--nc:var(--c6)" onclick="showScreen('puzzleScreen')">
      <div class="hnb-icon">🧩</div>
      <div class="hnb-body"><div class="hnb-title">PUZZLES</div><div class="hnb-sub" id="homePuzzleCount">Earn pieces in-game</div></div>
    </button>
    <button class="home-nav-btn" style="--nc:var(--c2)" onclick="showScreen('profileScreen')">
      <div class="hnb-icon">👤</div>
      <div class="hnb-body"><div class="hnb-title">PROFILE</div><div class="hnb-sub" id="homeProfileSub">View your stats</div></div>
    </button>
    <button class="home-nav-btn" style="--nc:var(--c5)" onclick="showScreen('achScreen')">
      <div class="hnb-icon">🏅</div>
      <div class="hnb-body"><div class="hnb-title">ACHIEVEMENTS</div><div class="hnb-sub" id="homeAchCount">0 / 16 unlocked</div></div>
    </button>
    <button class="home-nav-btn" style="--nc:var(--c4)" onclick="showScreen('missionsScreen')">
      <div class="hnb-icon">🎯</div>
      <div class="hnb-body"><div class="hnb-title">MISSIONS</div><div class="hnb-sub" id="homeMissionCount">Daily quests</div></div>
    </button>
  </div>

  <!-- Quick tips -->
  <div class="home-tips">
    <div class="tip-pill">👆 <span>Tap + drag matching tiles</span></div>
    <div class="tip-pill">🔥 <span>7+ tiles = 5× multiplier</span></div>
    <div class="tip-pill">🌡️ <span>3 chains = FEVER 2×</span></div>
    <div class="tip-pill">💣 <span>Bomb blasts neighbours</span></div>
  </div>

  <!-- Referral card -->
  <div style="padding:0 16px;width:100%;box-sizing:border-box;">
    <div class="referral-card">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--c2);letter-spacing:2px;margin-bottom:2px;">🤝 INVITE A FRIEND — BOTH GET 20🪙</div>
      <div style="font-size:9px;color:var(--muted);margin-bottom:4px;">Share your code. When a friend enters it in-game, you both get 20 free coins.</div>
      <div class="ref-code-box">
        <div class="ref-code" id="refCodeDisplay">—</div>
        <button class="ref-copy-btn" onclick="copyReferralCode()">COPY & SHARE</button>
      </div>
      <div style="font-size:9px;color:var(--muted);" id="refStatus"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="home-footer">
    <button onclick="toggleMode()" id="modeFooterBtn">🌙 Theme</button>
    <button onclick="toggleColourBlind()">👁️ Accessibility</button>
    <a href="https://policies.google.com/privacy" target="_blank">Privacy</a>
    <button onclick="showToast('GRIDLOCK v9.0 — playgridlock.site')">v9.0</button>
  </div>

</div>

<!-- ═══════════ TUTORIAL OVERLAY ═══════════ -->
<div class="tutorial-overlay hidden" id="tutorialOverlay">
  <div class="tutorial-card">
    <div class="tut-icon" id="tutIcon">👆</div>
    <div class="tut-title" id="tutTitle">HOW TO PLAY</div>
    <div class="tut-body" id="tutBody">Welcome to GRIDLOCK!</div>
    <div class="tut-dots" id="tutDots"></div>
    <button class="tut-next-btn" id="tutNextBtn" onclick="tutorialNext()">NEXT →</button>
  </div>
</div>
<div class="screen hidden" id="instrScreen">
  <div style="margin-top:6px;"></div>
  <div class="scr-title" style="color:var(--c2);font-size:38px;">HOW TO PLAY</div>
  <div class="instr-sec">
    <div class="instr-title" style="color:var(--c2);">⛓️ BUILDING A CHAIN</div>
    <div class="instr-row"><div class="instr-ico">1️⃣</div><div class="instr-text"><strong>Tap any tile</strong> to start — it glows and shows ①.</div></div>
    <div class="instr-row"><div class="instr-ico">2️⃣</div><div class="instr-text"><strong>Tap or drag</strong> adjacent tiles of the <strong>same colour</strong> to extend.</div></div>
    <div class="instr-row"><div class="instr-ico">🔙</div><div class="instr-text"><strong>Tap a tile already in chain</strong> to trim back to that point.</div></div>
    <div class="instr-row"><div class="instr-ico">⚡</div><div class="instr-text"><strong>Tap ⚡ CHAIN</strong> (or Space) to clear all selected tiles and score.</div></div>
  </div>
  <div class="instr-sec">
    <div class="instr-title" style="color:var(--c3);">⚡ MULTIPLIERS</div>
    <div class="mult-row">
      <div class="mult-chip" style="background:rgba(0,229,255,.12);color:var(--c2);">2 = 1×</div>
      <div class="mult-chip" style="background:rgba(255,230,0,.12);color:var(--c3);">3–4 = 2×</div>
      <div class="mult-chip" style="background:rgba(255,107,0,.12);color:var(--c5);">5–6 = 3×</div>
      <div class="mult-chip" style="background:rgba(255,45,85,.15);color:var(--c1);">7+ = 5× 🔥</div>
    </div>
  </div>
  <div class="instr-sec">
    <div class="instr-title" style="color:var(--c4);">🆕 SPECIAL TILES</div>
    <div class="instr-row"><div class="instr-ico">❄️</div><div class="instr-text"><strong>Frozen tiles</strong> — appear at higher levels. Must be included in a chain to unfreeze. They do not score until unfrozen.</div></div>
    <div class="instr-row"><div class="instr-ico">✨</div><div class="instr-text"><strong>Wild tiles</strong> — match any colour. Including one in a chain activates +1 bonus multiplier on top of chain length.</div></div>
    <div class="instr-row"><div class="instr-ico">💣</div><div class="instr-text"><strong>Bomb tiles</strong> — appear at level 6+. Committing a chain with a Bomb tile blasts all surrounding tiles as a bonus.</div></div>
  </div>
  <div class="instr-sec">
    <div class="instr-title" style="color:var(--c4);">💡 POWER-UPS</div>
    <div class="instr-row"><div class="instr-ico">💡</div><div class="instr-text"><strong>HINT 25🪙</strong> — Highlights the biggest matching group.</div></div>
    <div class="instr-row"><div class="instr-ico">🔀</div><div class="instr-text"><strong>SHUFFLE 40🪙</strong> — Randomises all tiles when stuck.</div></div>
    <div class="instr-row"><div class="instr-ico">💣</div><div class="instr-text"><strong>BOMB 60🪙</strong> — Blasts all tiles of one colour.</div></div>
    <div class="instr-row"><div class="instr-ico">⏱️</div><div class="instr-text"><strong>+TIME 50🪙</strong> — Adds 8 seconds to the clock.</div></div>
  </div>
  <div class="instr-sec">
    <div class="instr-title" style="color:var(--c5);">🔥 FEVER &amp; BONUS ROUND</div>
    <div class="instr-row"><div class="instr-ico">🌡️</div><div class="instr-text"><strong>Fever Mode</strong> — Making 3 chains quickly fills the Fever bar. In Fever, all multipliers are doubled for 8 seconds.</div></div>
    <div class="instr-row"><div class="instr-ico">🎯</div><div class="instr-text"><strong>Bonus Round</strong> — Every 3 levels, a 15-second frenzy starts. Every tile cleared = +5 pts extra. No lives at risk.</div></div>
  </div>
  <div class="instr-sec">
    <div class="instr-title" style="color:var(--c1);">❤️ LIVES &amp; ECONOMY</div>
    <div class="instr-row"><div class="instr-ico">⏰</div><div class="instr-text">Timer runs out = lose a life. Lose 3 lives = game over.</div></div>
    <div class="instr-row"><div class="instr-ico">🪙</div><div class="instr-text">You earn a small number of coins by levelling up. Bigger rewards come from Daily Missions, achievements, and watching ads. Coins are <strong>scarce by design</strong> — they mean something!</div></div>
  </div>
  <button class="big-btn" onclick="hideScreen('instrScreen')">← BACK</button>
</div>

<!-- ═══════════ MISSIONS ═══════════ -->
<div class="screen hidden" id="missionsScreen">
  <div style="margin-top:6px;"></div>
  <div class="scr-title" style="color:var(--c3);font-size:40px;">DAILY MISSIONS</div>
  <div class="scr-sub">COMPLETE ALL 3 FOR A BONUS</div>
  <div id="missionsList" style="width:100%;max-width:380px;flex-shrink:0;"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const COLORS = ['c1','c2','c3','c4','c5','c6'];
const HEX    = {c1:'#ff2d55',c2:'#00e5ff',c3:'#ffe600',c4:'#39ff14',c5:'#ff6b00',c6:'#bf5af2'};
const SYM    = {c1:'▲',c2:'◆',c3:'●',c4:'★',c5:'■',c6:'✦'};
const STRIPE = {
  starter:'https://buy.stripe.com/cNi8wQ9cZbWrfDZ7tVfrW00',
  popular:'https://buy.stripe.com/dRm8wQdtfe4zdvR8xZfrW01',

  whale:  'https://buy.stripe.com/9B6cN688VaSn2Rd4hJfrW03',
  vip:    'https://buy.stripe.com/3cI28s4WJ7Gb8bx01tfrW04', // GRIDLOCK VIP Pass £1.99/month — LIVE
};
const BASE_COINS = {starter:100,popular:600,gamer:1400,whale:3500};

// ═══════════════════════════════════════════════
// COIN ECONOMY v8 — significantly scarcer
// Design philosophy: coins feel like real achievements.
// Average player earns ~15-25 coins/session (down from ~40+).
// ═══════════════════════════════════════════════
const ECONOMY = {
  startCoins:      10,   // v8: down from 20 — minimal starting purse
  levelUpLow:       1,   // levels 1-4: just 1 coin (was 3)
  levelUpMid:       2,   // levels 5-9: 2 coins (was 5)
  levelUpHigh:      4,   // levels 10+: 4 coins (was 8)
  streakBonus5:     2,   // 5-streak reward (was 4)
  missionReward:   [5, 8, 12],  // per mission slot (was 8,12,16)
  dailyBonus:      15,   // daily claim (was 20)
  watchAd1:         8,   // ad 1 (was 10)
  watchAd2:        18,   // ad series (was 25)
  dailyAllMissions: 8,   // all-3 bonus (was 10)
  chestCost:       30,   // now costs more to open (was 25)
  chestRewards:    [8,8,10,10,12,15,18,22,28,40,60,80], // slightly lower ceiling
  reviveCost:      60,   // revive more expensive (was 50)
  streakProtectCost:20,  // streak protect (was 15)
  hintCost:        30,   // hint (was 25)
  shuffleCost:     50,   // shuffle (was 40)
  bombCost:        75,   // bomb (was 60)
  timeCost:        60,   // time (was 50)

};

// ═══════════════════════════════════════════════
// PUZZLE SYSTEM v8
// Tiers: bronze, silver, gold, platinum, vip
// Each puzzle = 50 pieces. Pieces drop on level up.
// Cost to buy outright: 10,000 coins (reduced by pieces held).
// Reward on completion: varies by tier.
// ═══════════════════════════════════════════════
const PUZZLE_TIERS = {
  bronze:   {label:'BRONZE',   color:'#cd7f32', reward:100,  pieceRate:2, vipOnly:false},
  silver:   {label:'SILVER',   color:'#c0c0c0', reward:200,  pieceRate:3, vipOnly:false},
  gold:     {label:'GOLD',     color:'#ffd700', reward:400,  pieceRate:4, vipOnly:false},
  platinum: {label:'PLATINUM', color:'#e5e4e2', reward:750,  pieceRate:5, vipOnly:false},
  vip:      {label:'VIP',      color:'#bf5af2', reward:1500, pieceRate:6, vipOnly:true},
};
const PUZZLE_DEFS = [
  // Bronze puzzles
  {id:'b1', tier:'bronze', name:'CITY GRID',    seed:1001, totalPieces:50},
  {id:'b2', tier:'bronze', name:'NEON MAZE',    seed:1002, totalPieces:50},
  {id:'b3', tier:'bronze', name:'PIXEL TOWER',  seed:1003, totalPieces:50},
  // Silver puzzles
  {id:'s1', tier:'silver', name:'OCEAN WAVE',   seed:2001, totalPieces:50},
  {id:'s2', tier:'silver', name:'CRYSTAL CAVE', seed:2002, totalPieces:50},
  {id:'s3', tier:'silver', name:'STORM FRONT',  seed:2003, totalPieces:50},
  // Gold puzzles
  {id:'g1', tier:'gold',   name:'SOLAR FLARE',  seed:3001, totalPieces:50},
  {id:'g2', tier:'gold',   name:'DRAGON PEAK',  seed:3002, totalPieces:50},
  // Platinum puzzles
  {id:'p1', tier:'platinum',name:'COSMOS',      seed:4001, totalPieces:50},
  {id:'p2', tier:'platinum',name:'ABYSS',       seed:4002, totalPieces:50},
  // VIP puzzles
  {id:'v1', tier:'vip',    name:'VIP CROWN',    seed:5001, totalPieces:50},
  {id:'v2', tier:'vip',    name:'ELITE GRID',   seed:5002, totalPieces:50},
];
const PUZZLE_PIECES_KEY = 'gl_puzzle_pieces_v1'; // {puzzleId: piecesEarned}
const PUZZLE_DONE_KEY   = 'gl_puzzle_done_v1';   // {puzzleId: true}
const PUZZLE_LB_KEY     = 'gridlock_puzzle_lb_v1'; // shared

function loadPuzzleState(){
  try{return JSON.parse(localStorage.getItem(PUZZLE_PIECES_KEY)||'{}');}catch(e){return {};}
}
function savePuzzleState(ps){localStorage.setItem(PUZZLE_PIECES_KEY,JSON.stringify(ps));}
function loadPuzzleDone(){
  try{return JSON.parse(localStorage.getItem(PUZZLE_DONE_KEY)||'{}');}catch(e){return {};}
}
function savePuzzleDone(pd){localStorage.setItem(PUZZLE_DONE_KEY,JSON.stringify(pd));}

// Generate a deterministic colourful preview grid from a seed (7×7 = 49 cells ≈ 50 pieces)
function puzzlePreviewColors(seed){
  let s=seed; function rng(){s=((s*1664525+1013904223)>>>0);return s/4294967296;}
  const cols=['#ff2d55','#00e5ff','#ffe600','#39ff14','#ff6b00','#bf5af2'];
  return Array.from({length:49},()=>cols[Math.floor(rng()*cols.length)]);
}

// Get the active (first incomplete) puzzle for a given tier
function getActivePuzzle(tier){
  const ps=loadPuzzleState(); const pd=loadPuzzleDone();
  return PUZZLE_DEFS.filter(p=>p.tier===tier&&!pd[p.id])[0]||null;
}

// Earn a puzzle piece after level up — called from doLevelUp
function tryEarnPuzzlePiece(){
  // Find the first incomplete puzzle (by tier priority)
  const tierOrder=['bronze','silver','gold','platinum','vip'];
  const ps=loadPuzzleState(); const pd=loadPuzzleDone();
  let target=null;
  for(const t of tierOrder){
    if(t==='vip'&&!S.vip) continue;
    const active=PUZZLE_DEFS.filter(p=>p.tier===t&&!pd[p.id])[0];
    if(active){target=active;break;}
  }
  if(!target) return null;
  const pieces=(ps[target.id]||0)+1;
  ps[target.id]=pieces;
  savePuzzleState(ps);
  // Check completion
  if(pieces>=target.totalPieces){
    completePuzzle(target);
    return {puzzle:target, pieces, completed:true};
  }
  return {puzzle:target, pieces, completed:false};
}

function completePuzzle(def){
  const pd=loadPuzzleDone(); pd[def.id]=true; savePuzzleDone(pd);
  const tier=PUZZLE_TIERS[def.tier];
  S.coins+=tier.reward; saveCoins(); updateUI();
  // Submit to puzzle leaderboard
  submitPuzzleLb(def);
  // Big celebration
  spawnConfetti();
  setTimeout(()=>{
    showToast(`🧩 PUZZLE COMPLETE! ${def.name} +${tier.reward}🪙`);
  },300);
}

async function submitPuzzleLb(def){
  const name=localStorage.getItem('gl_player_name')||'Anonymous';
  try{
    const res=await window.storage.get(PUZZLE_LB_KEY,true);
    let board=res?JSON.parse(res.value):[];
    // Remove old entry for this player+puzzle
    board=board.filter(e=>!(e.name===name&&e.puzzleId===def.id));
    board.push({name,puzzleId:def.id,puzzleName:def.name,tier:def.tier,ts:Date.now()});
    board=board.slice(0,200);
    await window.storage.set(PUZZLE_LB_KEY,JSON.stringify(board),true);
  }catch(e){}
}

async function renderPuzzleLeaderboard(){
  const el=document.getElementById('puzzleLbList'); if(!el)return;
  el.textContent='Loading…';
  try{
    const res=await window.storage.get(PUZZLE_LB_KEY,true);
    const board=res?JSON.parse(res.value):[];
    if(!board.length){el.textContent='No completions yet — be the first!';return;}
    // Count completions per player
    const counts={};
    board.forEach(e=>{counts[e.name]=(counts[e.name]||0)+1;});
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const medals=['🥇','🥈','🥉'];
    el.innerHTML=sorted.map(([name,count],i)=>
      `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:10px;">
        <span>${medals[i]||`${i+1}.`} ${name}</span>
        <span style="color:var(--c6);">${count} puzzle${count>1?'s':''}</span>
      </div>`
    ).join('');
  }catch(e){el.textContent='Could not load puzzle leaderboard.';}
}

function renderPuzzleScreen(){
  // Render active puzzle card
  const tierOrder=['bronze','silver','gold','platinum','vip'];
  const ps=loadPuzzleState(); const pd=loadPuzzleDone();
  let active=null;
  for(const t of tierOrder){
    if(t==='vip'&&!S.vip) continue;
    active=PUZZLE_DEFS.filter(p=>p.tier===t&&!pd[p.id])[0];
    if(active) break;
  }
  if(active){
    document.getElementById('activePuzzleName').textContent=active.name;
    const tier=PUZZLE_TIERS[active.tier];
    document.getElementById('activeTierBadge').textContent=tier.label;
    document.getElementById('activeTierBadge').style.background=tier.color;
    document.getElementById('activeTierBadge').style.color= active.tier==='platinum'?'#333':'#fff';
    const pieces=ps[active.id]||0;
    document.getElementById('activePuzzleProgress').textContent=`${pieces} / ${active.totalPieces} pieces`;
    document.getElementById('activePuzzleFill').style.width=`${(pieces/active.totalPieces)*100}%`;
    document.getElementById('activePuzzleReward').textContent=`Reward: ${tier.reward}🪙`;
    // Draw mini preview
    const grid=document.getElementById('activePuzzleGrid');
    const colors=puzzlePreviewColors(active.seed);
    grid.innerHTML='';
    colors.forEach((col,i)=>{
      const cell=document.createElement('div');
      cell.className='puzzle-piece-cell '+(i<pieces?'piece-filled':'piece-empty');
      cell.style.background=col;
      grid.appendChild(cell);
    });
  }
  // Render the first tier by default
  switchPuzzleTier('bronze');
  renderPuzzleLeaderboard();
}

let _activePuzzleTier='bronze';
function switchPuzzleTier(tier){
  _activePuzzleTier=tier;
  document.querySelectorAll('.pt-tab').forEach(t=>t.classList.toggle('active',t.dataset.tier===tier));
  const ps=loadPuzzleState(); const pd=loadPuzzleDone();
  const list=document.getElementById('puzzleList'); if(!list) return;
  list.innerHTML='';
  const tierDefs=PUZZLE_DEFS.filter(p=>p.tier===tier);
  const tierInfo=PUZZLE_TIERS[tier];
  tierDefs.forEach(def=>{
    const pieces=ps[def.id]||0;
    const done=!!pd[def.id];
    const isVipLocked=def.tier==='vip'&&!S.vip;
    const colors=puzzlePreviewColors(def.seed);
    const pct=Math.min(100,(pieces/def.totalPieces)*100);
    // Cost to buy remaining pieces
    const remaining=def.totalPieces-pieces;
    const coinCost=Math.max(0,Math.round(10000*(remaining/def.totalPieces)));

    const card=document.createElement('div');
    card.className='puzzle-card'+(isVipLocked?' locked':'');
    card.innerHTML=`
      <div class="puzzle-tier-badge" style="background:${tierInfo.color};color:${tier==='platinum'?'#333':'#fff'}">${tierInfo.label}</div>
      <div class="puzzle-card-title">${isVipLocked?'🔒 VIP ONLY':def.name}</div>
      <div class="puzzle-preview" style="margin:8px 0;">${colors.map((c,i)=>`<div class="puzzle-piece-cell ${i<pieces&&!isVipLocked?'piece-filled':'piece-empty'}" style="background:${c}"></div>`).join('')}</div>
      <div class="puzzle-progress-bar"><div class="puzzle-progress-fill" style="width:${done?100:pct}%;background:${tierInfo.color};"></div></div>
      <div class="puzzle-meta">
        <span class="puzzle-pieces-text">${done?'✅ COMPLETE':isVipLocked?'Subscribe to unlock':`${pieces} / ${def.totalPieces} pieces`}</span>
        ${done?`<span style="font-size:22px;">🏆</span>`:isVipLocked?'':`<button class="puzzle-buy-btn" onclick="buyPuzzlePieces('${def.id}')" style="background:${tierInfo.color};color:${tier==='platinum'?'#333':'#fff'};">BUY ${coinCost}🪙</button>`}
      </div>
      ${done?'<div class="puzzle-completed-seal">✅</div>':''}
    `;
    list.appendChild(card);
  });
}

function buyPuzzlePieces(puzzleId){
  const def=PUZZLE_DEFS.find(p=>p.id===puzzleId); if(!def) return;
  const ps=loadPuzzleState();
  const pieces=ps[puzzleId]||0;
  const remaining=def.totalPieces-pieces;
  if(remaining<=0){showToast('Already complete!');return;}
  const coinCost=Math.max(0,Math.round(10000*(remaining/def.totalPieces)));
  if(coinCost===0){showToast('Almost done — just play to finish!');return;}
  if(!spendCoins(coinCost)){showToast(`Need ${coinCost}🪙 to unlock this puzzle`);showScreen('storeScreen');return;}
  ps[puzzleId]=def.totalPieces;
  savePuzzleState(ps);
  completePuzzle(def);
  renderPuzzleScreen();
}

function renderProfileScreen(){
  const name=localStorage.getItem('gl_player_name')||'PLAYER';
  document.getElementById('profileNameDisplay').textContent=name.toUpperCase();
  document.getElementById('profileTag').textContent=`#gridlock · ${(S.stats.gamesPlayed||0)} games played`;
  // Pick avatar emoji based on high score
  const avatars=['🎮','⭐','🔥','💎','👑'];
  const idx=Math.min(Math.floor(S.highScore/5000),4);
  document.getElementById('profileAvatar').textContent=avatars[idx];
  document.getElementById('prHiScore').textContent=S.highScore.toLocaleString();
  document.getElementById('prGames').textContent=S.stats.gamesPlayed||0;
  document.getElementById('prStreak').textContent=S.stats.loginStreak||0;
  document.getElementById('prTiles').textContent=(S.stats.totalTiles||0).toLocaleString();
  // Puzzle stats
  const pd=loadPuzzleDone();
  const ps=loadPuzzleState();

// ═══════════════════════════════════════════════
// SEEDED RNG
// ═══════════════════════════════════════════════
function seededRNG(seed){
  let s=seed>>>0;
  return ()=>{s=Math.imul(1664525,s)+1013904223>>>0; return s/4294967296;};
}
function todaySeed(){
  const d=new Date();
  return (d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate())*7919;
}

const LB_KEY = 'gridlock_leaderboard_v1'; // shared across all players

async function submitLeaderboard(){
  const inp = document.getElementById('lbNameInput');
  const name = (inp?.value||'').trim().replace(/[<>]/g,'').substring(0,12);
  if(!name){showToast('Enter your name first!');return;}
  if(S.highScore<=0){showToast('Play a game first to get a score!');return;}

  // Save name locally
  localStorage.setItem('gl_player_name', name);
  if(inp) inp.value='';

  const entry = {name, score: S.highScore, date: new Date().toLocaleDateString('en-GB')};
  showToast('Submitting to global leaderboard…');

  try {
    // Read current board
    let board = [];
    try {
      const res = await window.storage.get(LB_KEY, true);
      if(res) board = JSON.parse(res.value);
    } catch(e){ board=[]; }

    // Remove any previous entry from same player name and add new one
    board = board.filter(e=>e.name.toLowerCase()!==name.toLowerCase());
    board.push(entry);
    board.sort((a,b)=>b.score-a.score);
    board = board.slice(0,50); // keep top 50

    await window.storage.set(LB_KEY, JSON.stringify(board), true);
    showToast(`🏆 ${name} added to global leaderboard!`);
    renderLeaderboard();
  } catch(e) {
    // Fallback: save locally if storage unavailable
    S.leaderboard = S.leaderboard||[];
    S.leaderboard = S.leaderboard.filter(e=>e.name.toLowerCase()!==name.toLowerCase());
    S.leaderboard.push(entry);
    S.leaderboard.sort((a,b)=>b.score-a.score);
    S.leaderboard = S.leaderboard.slice(0,50);
    localStorage.setItem('gl_lb', JSON.stringify(S.leaderboard));
    showToast(`Score saved! (offline mode)`);
    renderLeaderboard();
  }
}

async function refreshLeaderboard(){
  document.getElementById('lbLoading').textContent='Refreshing…';
  document.getElementById('lbLoading').style.display='block';
  document.getElementById('lbList').innerHTML='';
  await renderLeaderboard();
}

async function renderLeaderboard(){
  const list = document.getElementById('lbList');
  const loading = document.getElementById('lbLoading');
  const myName = localStorage.getItem('gl_player_name')||'';
  if(!list) return;

  // Pre-fill name input if we have a saved name
  const inp = document.getElementById('lbNameInput');
  if(inp && myName) inp.placeholder = myName+' (saved)';

  let board = [];
  let isGlobal = false;

  try {
    const res = await window.storage.get(LB_KEY, true);
    if(res){
      board = JSON.parse(res.value);
      isGlobal = true;
      document.getElementById('lbWeekLabel').textContent = `🌍 GLOBAL · ${board.length} PLAYERS`;
    }
  } catch(e){}

  if(!board.length){
    // Fallback to local
    board = JSON.parse(localStorage.getItem('gl_lb')||'[]');
    if(!board.length && S.leaderboard?.length) board = S.leaderboard;
    document.getElementById('lbWeekLabel').textContent = isGlobal ? '🌍 GLOBAL' : '📱 LOCAL SCORES';
  }

  if(loading) loading.style.display = 'none';
  list.innerHTML = '';

  if(!board.length){
    list.innerHTML='<div style="font-size:11px;color:var(--muted);text-align:center;padding:20px;">No scores yet — be the first!</div>';
    return;
  }

  const medals=['🥇','🥈','🥉'];
  board.slice(0,20).forEach((e,i)=>{
    const isYou = myName && e.name.toLowerCase()===myName.toLowerCase();
    const row = document.createElement('div');
    row.className='lb-row'+(isYou?' lb-you':'');
    row.innerHTML=`<div class="lb-rank">${medals[i]||(i+1)}</div>
      <div><div class="lb-name">${e.name}${isYou?' 👈':''}</div>
      <div style="font-size:8px;color:var(--muted);">${e.date||''}</div></div>
      <div class="lb-score">${(+e.score).toLocaleString()}</div>`;
    list.appendChild(row);
  });

  // Show today's top on HUD strip
  if(board[0]){
    const strip = document.getElementById('topScoreStrip');
    if(strip){
      strip.style.display='block';
      document.getElementById('tssName').textContent = board[0].name;
      document.getElementById('tssScore').textContent = (+board[0].score).toLocaleString();
    }
  }
}

async function autoSubmitIfNamed(score){
  const name = localStorage.getItem('gl_player_name');

  try {
    let board=[];
    try{const r=await window.storage.get(LB_KEY,true);if(r)board=JSON.parse(r.value);}catch(e){}
    const existing=board.find(e=>e.name.toLowerCase()===name.toLowerCase());

  }catch(e){}
}

function getTodayMissions(){
  const today=new Date().toDateString();
  if(S.missionDay!==today){
    S.missionDay=today; S.missionProgress={};
    localStorage.setItem('gl_mday',today);
    localStorage.setItem('gl_mprg','{}');
  }
  const rng=seededRNG(todaySeed()+99991);
  const picked=[], used=new Set();
  while(picked.length<3){
    const t=MISSION_TPL[Math.floor(rng()*MISSION_TPL.length)];
    if(used.has(t.id))continue; used.add(t.id);
    const ti=Math.floor(rng()*t.targets.length);
    picked.push({...t, target:t.targets[ti], label:t.label.replace('{n}',t.targets[ti])});
  }
  return picked;
}
function checkMissionProgress(){
  const missions=getTodayMissions(); let coinsEarned=0;
  missions.forEach((m,i)=>{
    if((S.missionProgress['m'+i]||0)>=m.target) return;
    let prog=0;
    if(m.id==='chains') prog=S.sessionChains;
    else if(m.id==='tiles') prog=S.sessionTiles;
    else if(m.id==='chain5') prog=S.bestChain>=m.target?m.target:0;
    else if(m.id==='level') prog=S.level>=m.target?m.target:0;
    else if(m.id==='score') prog=S.score>=m.target?m.target:0;
    else if(m.id==='streak') prog=S.streak>=m.target?m.target:(S.stats.maxStreak||0)>=m.target?m.target:S.streak;
    S.missionProgress['m'+i]=Math.max(S.missionProgress['m'+i]||0,prog);
    if(S.missionProgress['m'+i]>=m.target){
      coinsEarned+=ECONOMY.missionReward[i];
      S.stats.missionsCompleted=(S.stats.missionsCompleted||0)+1;
    }
  });
  // All 3 bonus
  const allDone=missions.every((_,i)=>(S.missionProgress['m'+i]||0)>=missions[i].target);
  const allKey='gl_mbonus_'+new Date().toDateString();
  if(allDone && !localStorage.getItem(allKey)){
    coinsEarned+=ECONOMY.dailyAllMissions;
    localStorage.setItem(allKey,'1');
    showToast(`🎯 All missions done! +${ECONOMY.dailyAllMissions}🪙 bonus!`);
  }
  localStorage.setItem('gl_mprg',JSON.stringify(S.missionProgress));
  if(coinsEarned>0){S.coins+=coinsEarned; saveCoins(); showToast(`🎯 Mission! +${coinsEarned}🪙`);}
  updateMissionsUI();
}
function updateMissionsUI(){
  const missions=getTodayMissions();
  const list=document.getElementById('missionsList'); if(!list)return;
  list.innerHTML=''; let allDone=true;
  missions.forEach((m,i)=>{
    const prog=S.missionProgress['m'+i]||0;
    const done=prog>=m.target;
    if(!done)allDone=false;
    const reward=ECONOMY.missionReward[i];
    const card=document.createElement('div');
    card.className='mission-card'+(done?' done':'');
    card.innerHTML=`<div style="font-size:20px;min-width:28px;text-align:center;">${done?'✅':'🎯'}</div>
      <div class="mc-body">
        <div class="mc-title">${m.label}</div>
        <div class="mc-desc">${done?'COMPLETE!':'In progress this session'}</div>
        <div class="mc-bar"><div class="mc-fill" style="width:${Math.min(100,prog/m.target*100)}%"></div></div>
      </div>
      <div class="mc-reward">${done?'✓':'+'+reward}🪙</div>`;
    list.appendChild(card);
  });
  document.getElementById('missionsAllDone')?.classList.toggle('hidden',!allDone);
  // Ticker
  const ticker=document.getElementById('missionTicker');
  const notDone=missions.find((_,i)=>(S.missionProgress['m'+i]||0)<missions[i].target);
  if(notDone&&S.running){
    const idx=missions.indexOf(notDone);
    document.getElementById('tickerLabel').textContent=notDone.label;
    document.getElementById('tickerProg').textContent=(S.missionProgress['m'+idx]||0)+'/'+notDone.target;
    ticker.style.display='block';
  } else { ticker.style.display='none'; }
}

function saveStats(){

  S.stats.totalChains=(S.stats.totalChains||0)+S.totalChains;
  S.stats.totalScore=(S.stats.totalScore||0)+S.score;
