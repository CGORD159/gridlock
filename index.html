function updateLoginStreak(){
  const today=new Date().toDateString(), last=S.stats.lastLogin||'';
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(last===today)return;
  S.stats.loginStreak=(last===yesterday)?(S.stats.loginStreak||0)+1:1;
  S.stats.lastLogin=today;
  S.stats.maxChainToday=0; S.stats.maxLevelToday=0; S.stats.maxScoreToday=0;
  localStorage.setItem('gl_stats',JSON.stringify(S.stats));
}
function renderStatsScreen(){
  const grid=document.getElementById('statsGrid'); if(!grid)return;
  grid.innerHTML='';
  [
    ['🏆',S.highScore.toLocaleString(),'HIGH SCORE'],
    ['🎮',(S.stats.gamesPlayed||0),'GAMES PLAYED'],
    ['💎',(S.stats.totalTiles||0).toLocaleString(),'TILES CLEARED'],
    ['⛓️',(S.stats.totalChains||0).toLocaleString(),'TOTAL CHAINS'],
    ['🔥',(S.stats.maxStreak||0),'BEST STREAK'],
    ['📅',(S.stats.loginStreak||0),'DAY STREAK'],
  ].forEach(([ico,val,lbl])=>{
    const c=document.createElement('div'); c.className='stat-card';
    c.innerHTML=`<div style="font-size:20px;margin-bottom:4px;">${ico}</div><div class="sc-val">${val}</div><div class="sc-lbl">${lbl}</div>`;
    grid.appendChild(c);
  });
  const canvas=document.getElementById('scoreChart'); if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const h=S.stats.scoreHistory||[];
  const W=canvas.offsetWidth||320; canvas.width=W;
  ctx.clearRect(0,0,W,80);
  if(h.length<2){ctx.fillStyle='#4a4a6a';ctx.font='11px monospace';ctx.fillText('Play more games to see chart',10,44);return;}
  const max=Math.max(...h,1), bw=W/h.length;
  h.forEach((sc,i)=>{
    const bh=Math.max(4,(sc/max)*68);
    const g=ctx.createLinearGradient(0,80-bh,0,80);
    g.addColorStop(0,'#00e5ff'); g.addColorStop(1,'rgba(0,229,255,0.1)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.roundRect(i*bw+2,80-bh,bw-4,bh,3); ctx.fill();
  });
}

// ═══════════════════════════════════════════════
// HOME SCREEN STATS UPDATER
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// XP / RANK SYSTEM
// Players earn XP from: scores, chains, levels, daily bonus
// XP is purely cosmetic — bragging rights + profile badge
// ═══════════════════════════════════════════════
const XP_RANKS = [
  {name:'ROOKIE',     color:'#6a6a8a', min:0},
  {name:'CHAINER',    color:'#39ff14', min:500},
  {name:'BLAZER',     color:'#00e5ff', min:1500},
  {name:'CRUSHER',    color:'#ff6b00', min:3500},
  {name:'GRIDMASTER', color:'#ffd700', min:7000},
  {name:'LEGEND',     color:'#ff2d55', min:15000},
  {name:'ELITE',      color:'#bf5af2', min:30000},
];
const XP_KEY = 'gl_xp_v1';
function loadXP(){return parseInt(localStorage.getItem(XP_KEY)||'0');}
function saveXP(xp){localStorage.setItem(XP_KEY,String(xp));}
function awardXP(amount){
  const xp=loadXP()+amount;
  saveXP(xp);
  const before=getRank(xp-amount);
  const after=getRank(xp);
  if(after.name!==before.name){
    setTimeout(()=>showToast(`🏅 RANK UP! You're now ${after.name}!`),400);
  }
  return xp;
}
function getRank(xp){
  let rank=XP_RANKS[0];
  for(const r of XP_RANKS){if(xp>=r.min)rank=r;}
  return rank;
}
function getXPProgress(xp){
  let rankIdx=0;
  for(let i=0;i<XP_RANKS.length;i++){if(xp>=XP_RANKS[i].min)rankIdx=i;}
  if(rankIdx>=XP_RANKS.length-1) return {pct:100,toNext:0,nextName:'MAX'};
  const cur=XP_RANKS[rankIdx].min;
  const next=XP_RANKS[rankIdx+1].min;
  const pct=Math.round(((xp-cur)/(next-cur))*100);
  return {pct,toNext:next-xp,nextName:XP_RANKS[rankIdx+1].name};
}
function updateXPBar(){
  const xp=loadXP();
  const rank=getRank(xp);
  const prog=getXPProgress(xp);
  const lbl=document.getElementById('homeRankLabel');
  const fill=document.getElementById('homeXpFill');
  const next=document.getElementById('homeXpNext');
  if(lbl){lbl.textContent=`🏅 ${rank.name}`;lbl.style.color=rank.color;}
  if(fill)fill.style.width=prog.pct+'%';
  if(next)next.textContent=prog.toNext>0?`${xp.toLocaleString()} XP · ${prog.toNext} to ${prog.nextName}`:`${xp.toLocaleString()} XP — MAX RANK`;
}

// ═══════════════════════════════════════════════
// GRID — SPECIAL TILES
// ═══════════════════════════════════════════════
function generateGrid(rngFn){
  const rng=rngFn||Math.random.bind(Math);
  const colors=COLORS.slice(0,S.colorsInPlay);
  // clusterStrength: 1.0=fully grouped (easy), 0=random+broken (hard)
  // L1→0.52, L6→0.27, L13→0.0  — steeper ramp than v8
  const clusterStrength=Math.max(0, 0.52-(S.level*0.042));
  S.grid=Array.from({length:S.cols*S.rows},()=>colors[Math.floor(rng()*colors.length)]);
  // Low levels: clustering passes to create obvious chains
  if(clusterStrength>0.04){
    const passes=clusterStrength>0.3?3:2;
    for(let pass=0;pass<passes;pass++){
      for(let i=0;i<S.grid.length;i++){
        if(rng()<clusterStrength){
          const adj=getAdjacent(i);
          if(adj.length>0) S.grid[i]=S.grid[adj[Math.floor(rng()*adj.length)]];
        }
      }
    }
  }
  // Level 6+: actively break up clusters. Probability rises with level.
  if(S.level>=6){
    const breakProb=Math.min(0.72,(S.level-5)*0.09);
    const thresh=S.level>=12?2:3; // break 2-neighbour groups at L12+
    for(let i=0;i<S.grid.length;i++){
      const adj=getAdjacent(i);
      const sameN=adj.filter(a=>S.grid[a]===S.grid[i]).length;
      if(sameN>=thresh&&rng()<breakProb){
        const other=colors.filter(c=>c!==S.grid[i]);
        if(other.length) S.grid[i]=other[Math.floor(rng()*other.length)];
      }
    }
  }
  S.frozenTiles=new Set(); S.wildTiles=new Set(); S.bombTiles=new Set();
  if(S.level>=3&&!S.isDailyChallenge){
    const fc=Math.min(Math.floor(S.level/3),4);
    for(let i=0;i<fc;i++) S.frozenTiles.add(Math.floor(rng()*S.grid.length));
  }
  if(S.level>=5&&!S.isDailyChallenge) S.wildTiles.add(Math.floor(rng()*S.grid.length));
  if(S.level>=6&&!S.isDailyChallenge&&rng()<Math.min(0.7,0.35+(S.level-6)*0.05))
    S.bombTiles.add(Math.floor(rng()*S.grid.length));
  S.selected=[]; renderGrid();
}
function renderGrid(){
  const g=document.getElementById('grid');
  g.style.gridTemplateColumns=`repeat(${S.cols},var(--tile))`;
  g.innerHTML='';
  const isLight=document.getElementById('html').dataset.mode==='light';
  // In light mode use vivid solid fills; in dark use semi-transparent glow
  const bgAlpha=isLight?'dd':'22';
  const brAlpha=isLight?'ff':'66';
  S.grid.forEach((color,i)=>{
    const el=document.createElement('div');
    el.className='tile appearing';
    el.style.animationDelay=`${(i%S.cols)*.022+Math.floor(i/S.cols)*.030}s`;
    const isWild=S.wildTiles.has(i);
    const isBomb=S.bombTiles.has(i);
    const isFrozen=S.frozenTiles.has(i);
    // Get the CSS-variable resolved hex for this color in current mode
    const hexCol=getLightHex(color,isLight);
    if(isWild){
      el.style.background=isLight?'#555577':'rgba(255,255,255,0.15)';
      el.style.borderColor=isLight?'#888899':'rgba(255,255,255,0.5)';
      el.style.color='#fff';
      el.textContent='✨';
      el.classList.add('wild');
    } else if(isBomb){
      el.style.background=hexCol+bgAlpha;
      el.style.borderColor=hexCol+brAlpha;
      el.style.color=isLight?'#fff':hexCol;
      el.textContent='💣';
    } else {
      el.style.background=isFrozen?hexCol+(isLight?'aa':'15'):hexCol+bgAlpha;
      el.style.borderColor=isFrozen?(isLight?'#0055cc':'#00f0ff88'):hexCol+brAlpha;
      el.style.color=isLight?'#fff':hexCol;
      el.textContent=SYM[color];
      if(isFrozen)el.classList.add('frozen');
    }
    el.dataset.color=isWild?'wild':color;
    el.dataset.idx=i;
    g.appendChild(el);
  });
  attachGridEvents();
  updateNextHint();
}
// Light mode uses different hex values for contrast; dark uses the neon values
const LIGHT_HEX={c1:'#cc0033',c2:'#0066bb',c3:'#bb6600',c4:'#007700',c5:'#cc4400',c6:'#7700cc'};
function getLightHex(color,isLight){return isLight?(LIGHT_HEX[color]||HEX[color]):HEX[color];}
function getTile(i){return document.getElementById('grid').children[i]||null;}

// ═══════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════
let _drag=false;
function attachGridEvents(){
  const g=document.getElementById('grid');
  const ng=g.cloneNode(true); g.parentNode.replaceChild(ng,g);
  const grid=document.getElementById('grid');
  grid.addEventListener('mousedown',e=>{const t=e.target.closest('.tile');if(!t)return;_drag=true;onTileDown(+t.dataset.idx);});
  grid.addEventListener('mouseover',e=>{if(!_drag)return;const t=e.target.closest('.tile');if(t)onTileDrag(+t.dataset.idx);});
  window.addEventListener('mouseup',()=>_drag=false);
  grid.addEventListener('touchstart',e=>{e.preventDefault();_drag=true;const t=ptTile(e.touches[0]);if(t!==null)onTileDown(t);},{passive:false});
  grid.addEventListener('touchmove',e=>{e.preventDefault();if(!_drag)return;const t=ptTile(e.touches[0]);if(t!==null)onTileDrag(t);},{passive:false});
  grid.addEventListener('touchend',e=>{e.preventDefault();_drag=false;},{passive:false});
}
function ptTile(touch){const el=document.elementFromPoint(touch.clientX,touch.clientY);const t=el&&el.closest('.tile');return t?+t.dataset.idx:null;}

function tileColor(idx){
  // Wild tile matches anything
  if(S.wildTiles.has(idx)) return '__wild__';
  return S.grid[idx];
}
function isCompatible(idx, chainColor){
  if(S.frozenTiles.has(idx)) return false; // frozen cannot be added
  const tc=tileColor(idx);
  return tc==='__wild__' || tc===chainColor;
}

function onTileDown(idx){
  if(!S.running||S.animating||!S.grid[idx])return;
  if(S.frozenTiles.has(idx)){showToast('❄️ Frozen! Include in a chain to unfreeze');return;}
  const pos=S.selected.indexOf(idx);
  if(S.selected.length===0){S.selected.push(idx);refreshVisuals();updateComboUI();return;}
  if(pos>=0){S.selected.splice(pos+1);refreshVisuals();updateComboUI();return;}
  const last=S.selected[S.selected.length-1];
  const chainColor=S.grid[S.selected[0]];
  if(isCompatible(idx,chainColor)&&isAdj(last,idx)){
    S.selected.push(idx);refreshVisuals();updateComboUI();playTick();
  } else {
    clearSelection();S.selected.push(idx);refreshVisuals();updateComboUI();
  }
}
function onTileDrag(idx){
  if(!S.running||S.animating||!S.grid[idx])return;
  if(S.selected.length===0){onTileDown(idx);return;}
  const pos=S.selected.indexOf(idx);
  if(pos===S.selected.length-1)return;
  if(pos>=0){S.selected.splice(pos+1);refreshVisuals();updateComboUI();return;}
  const last=S.selected[S.selected.length-1];
  const chainColor=S.grid[S.selected[0]];
  if(isCompatible(idx,chainColor)&&isAdj(last,idx)){
    S.selected.push(idx);refreshVisuals();updateComboUI();playTick();
  }
}
function isAdj(a,b){const ac=a%S.cols,ar=Math.floor(a/S.cols),bc=b%S.cols,br=Math.floor(b/S.cols);return Math.abs(ac-bc)+Math.abs(ar-br)===1;}
function refreshVisuals(){
  const g=document.getElementById('grid');
  for(const el of g.children){el.classList.remove('selected','chain-head');el.removeAttribute('data-num');}
  S.selected.forEach((idx,pos)=>{const el=getTile(idx);if(!el)return;
    el.classList.add(pos===S.selected.length-1?'chain-head':'selected');el.dataset.num=pos+1;});
  document.getElementById('commitBtn').classList.toggle('ready',S.selected.length>=2);
}
function clearSelection(){
  S.selected.forEach(i=>{const el=getTile(i);if(el){el.classList.remove('selected','chain-head');el.removeAttribute('data-num');}});
  S.selected=[];
  document.getElementById('commitBtn').classList.remove('ready');
  updateComboUI();
}

// ═══════════════════════════════════════════════
// COMMIT CHAIN
// ═══════════════════════════════════════════════
function commitChain(){
  if(!S.running||S.animating)return;
  if(S.selected.length<2){showToast('Select 2+ connected same-colour tiles!');return;}
  S.animating=true;
  const len=S.selected.length;
  const hasWild=S.selected.some(i=>S.wildTiles.has(i));
  const hasBomb=S.selected.some(i=>S.bombTiles.has(i));
  let mult=getMultiplier(len);
  if(hasWild){mult++;S.stats.wildChained=true;localStorage.setItem('gl_stats',JSON.stringify(S.stats));}
  if(S.feverActive)mult*=2;
  if(S.bonusRoundActive)mult+=1; // bonus round extra pts via flat bonus below
  const pts=S.bonusRoundActive ? len*10*mult+len*5 : len*10*mult;
  showMultPopup(mult,len); showChainMilestone(len);
  const toRemove=[...S.selected];

  // Bomb blast bonus: remove all adjacent tiles
  let bombBonus=[];
  if(hasBomb){
    toRemove.forEach(idx=>{
      if(S.bombTiles.has(idx)){
        const adj=getAdjacent(idx);
        adj.forEach(a=>{if(!toRemove.includes(a))bombBonus.push(a);});
      }
    });
    bombBonus.forEach(i=>{const el=getTile(i);if(el)el.classList.add('clearing');});
    showToast('💣 BOMB! Blasted adjacent tiles!');
  }

  toRemove.forEach(i=>{const el=getTile(i);if(el){el.classList.remove('selected','chain-head');el.removeAttribute('data-num');el.classList.add('clearing');}});
  showChainBadge(len,hasWild,hasBomb);
  playChainSound(len);
  spawnParticles(len); // particle burst for chains 5+

  S.score+=pts;
  S.tilesCleared+=len+bombBonus.length;
  S.chainsMadeThisRound++;
  S.totalChains++;
  S.streak++;
  S.sessionChains++;
  S.sessionTiles+=len+bombBonus.length;
  if(len>S.bestChain)S.bestChain=len;
  S.stats.maxChainToday=Math.max(S.stats.maxChainToday||0,S.bestChain);
  S.stats.maxScoreToday=Math.max(S.stats.maxScoreToday||0,S.score);
  S.stats.maxLevelToday=Math.max(S.stats.maxLevelToday||0,S.level);
  checkMilestone();
  // Hot streak toast
  if(S.streak===5) showToast('🔥 5 CHAIN STREAK!');
  if(S.streak===10) showToast('🔥🔥 10 STREAK — ON FIRE!');
  if(S.streak===20) showToast('💀 20 STREAK — UNSTOPPABLE!');

  // Fever charge for non-fever mode quick chains
  if(!S.feverActive) addFeverCharge();

  // Streak bonus (rebalanced)
  if(S.streak>0&&S.streak%5===0){
    S.coins+=ECONOMY.streakBonus5; saveCoins();
    showToast(`🔥 ${S.streak} streak! +${ECONOMY.streakBonus5}🪙`);
  }

  // Coin doubler trigger — beat personal best by 25%+
  if(S.score>0&&S.highScore>0&&S.score>S.highScore*1.25&&S.doublerExpiry<Date.now()){
    activateDoubler(); showToast('🔥 Personal Best Smashed! Coin Doubler activated!');
  }

  S.selected=[];
  document.getElementById('commitBtn').classList.remove('ready');
  updateComboUI(); updateStreakUI(); updateUI();
  checkAchievements(); checkMissionProgress();

  setTimeout(()=>{
    toRemove.forEach(i=>{S.grid[i]=null; S.frozenTiles.delete(i); S.wildTiles.delete(i); S.bombTiles.delete(i);});
    bombBonus.forEach(i=>{S.grid[i]=null; S.frozenTiles.delete(i); S.wildTiles.delete(i); S.bombTiles.delete(i);});
    applyGravity();
    setTimeout(()=>{
      refillGrid(); S.animating=false; updateUI();
      if(!S.bonusRoundActive&&S.chainsMadeThisRound>=S.chainsNeeded) setTimeout(onRoundComplete,380);
    },210);
  },380);
}
function getMultiplier(len){return len>=7?5:len>=5?3:len>=3?2:1;}
function getAdjacent(idx){
  const c=idx%S.cols,r=Math.floor(idx/S.cols),adj=[];
  if(c>0)adj.push(idx-1); if(c<S.cols-1)adj.push(idx+1);
  if(r>0)adj.push(idx-S.cols); if(r<S.rows-1)adj.push(idx+S.cols);
  return adj;
}

// ═══════════════════════════════════════════════
// GRAVITY & REFILL
// ═══════════════════════════════════════════════
function applyGravity(){
  for(let c=0;c<S.cols;c++){
    let w=S.rows-1;
    for(let r=S.rows-1;r>=0;r--){
      const i=r*S.cols+c;
      if(S.grid[i]!==null){
        const wi=w*S.cols+c; S.grid[wi]=S.grid[i];
        if(wi!==i)S.grid[i]=null; w--;
      }
    }
  }
}
function refillGrid(){
  const colors=COLORS.slice(0,S.colorsInPlay);
  const rng=S.isDailyChallenge?seededRNG(todaySeed()+S.level*31+S.totalChains*7):Math.random.bind(Math);
  S.grid=S.grid.map(c=>c===null?colors[Math.floor(rng()*colors.length)]:c);
  renderGrid();
}

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════
function startTimer(){
  S.timeLeft=S.roundTime; clearInterval(S.timerInterval);
  S.timerInterval=setInterval(()=>{
    if(!S.running)return;
    S.timeLeft=Math.max(0,S.timeLeft-0.1); updateTimerBar();
    if(S.timeLeft<=0){clearInterval(S.timerInterval);onTimerEnd();}
  },100);
}
function updateTimerBar(){
  const pct=(S.timeLeft/S.roundTime)*100;
  const bar=document.getElementById('timerBar');
  bar.style.width=pct+'%';
  bar.classList.toggle('urgent',pct<25);
  bar.classList.toggle('critical',pct<10);
}
function onTimerEnd(){
  clearInterval(S.timerInterval);
  if(S.streak>=3) showStreakProtect();
  else loseLife();
}
function loseLife(){
  S.lives--; S.streak=0; updateStreakUI(); updateLivesUI(); playLifeLostSound();
  if(S.lives<=0){endGame();return;}
  S.score=Math.max(0,S.score-50); // smaller penalty in v4
  clearSelection(); startTimer(); updateUI();
  showToast(`⚠️ Life lost — ${S.lives} remaining`);
}
function updateLivesUI(){
  const wrap=document.querySelector('.lives');
  if(!wrap)return;
  // rebuild hearts dynamically
  wrap.querySelectorAll('.life').forEach(e=>e.remove());
  const show=Math.max(S.lives,3);
  for(let i=1;i<=show;i++){
    const sp=document.createElement('span');
    sp.className='life'+(i>S.lives?' lost':'');
    sp.textContent='❤️';
    wrap.appendChild(sp);
  }
  // grey out buy-heart button when at cap
  const btn=document.getElementById('buyHeartBtn');
  if(btn){
    const full=S.lives>=ECONOMY.maxHearts;
    btn.style.opacity=full?'0.35':'1';
    btn.style.pointerEvents=full?'none':'auto';
    const cd=document.getElementById('heartCostDisp');
    if(cd) cd.textContent=full?'FULL':`${ECONOMY.heartCost}🪙`;
  }
}

// ROUND COMPLETE / LEVEL UP
// ═══════════════════════════════════════════════
function onRoundComplete(){
  // Every 3 levels → Bonus Round instead of immediate level up
  if(S.level%3===0) startBonusRound();
  else doLevelUp();
}
function doLevelUp(){
  S.level++;
  S.chainsMadeThisRound=0;
  S.chainsNeeded=Math.min(3+Math.floor(S.level/2),8);
  S.roundTime=Math.max(8,22-S.level*0.7);
  S.colorsInPlay=Math.min(6,3+Math.floor(S.level/3));
  S.stats.maxLevelToday=Math.max(S.stats.maxLevelToday||0,S.level);
  const bonus= S.level>=10?ECONOMY.levelUpHigh: S.level>=5?ECONOMY.levelUpMid: ECONOMY.levelUpLow;
  S.coins+=bonus; saveCoins(); updateUI();
  const el=document.createElement('div'); el.className='lvlup'; el.textContent=`LEVEL ${S.level}`;
  document.body.appendChild(el); playLevelUpSound(); spawnConfetti(); setTimeout(()=>el.remove(),1000);
  showToast(`🎉 Level ${S.level}! +${bonus}🪙`);
  checkAchievements(); checkMissionProgress();

  // Puzzle piece — every ECONOMY.puzzlePieceInterval levels
  if(S.level % ECONOMY.puzzlePieceInterval === 0){
    const result=tryEarnPuzzlePiece();
    if(result){
      setTimeout(()=>{
        if(result.completed){
          showToast(`🧩 PUZZLE COMPLETE! ${result.puzzle.name}`);
        } else {
          showToast(`🧩 Puzzle piece! ${result.pieces}/${result.puzzle.totalPieces} — ${result.puzzle.name}`);
        }
      },700);
    }
  }

  applyBrainBurst(); // Brain Burst: extra colour + faster timer
  const rng=S.isDailyChallenge?seededRNG(todaySeed()+S.level*1999):null;
  generateGrid(rng);
  setTimeout(()=>showLevelIntro(S.level,S.chainsNeeded,S.roundTime),200);
  startTimer(); updateUI();
}

function spendCoins(n){
  if(S.coins<n){showToast(`Need ${n}🪙 — tap to get more!`);return false;}
  S.coins-=n; saveCoins(); updateUI(); return true;
}
function useHint(){
  if(!S.running||S.animating||!spendCoins(ECONOMY.hintCost))return;
  const best=largestGroup();
  best.forEach(i=>{const t=getTile(i);if(t){t.classList.remove('hint-glow');void t.offsetWidth;t.classList.add('hint-glow');}});
  setTimeout(()=>best.forEach(i=>getTile(i)?.classList.remove('hint-glow')),2000);
  showToast(`💡 Best group: ${best.length} tiles`);
}
function useShuffle(){
  if(!S.running||S.animating||!spendCoins(ECONOMY.shuffleCost))return;
  clearSelection();
  const colors=COLORS.slice(0,S.colorsInPlay);
  S.grid=S.grid.map(()=>colors[Math.floor(Math.random()*colors.length)]);
  S.frozenTiles=new Set(); S.wildTiles=new Set(); S.bombTiles=new Set();
  renderGrid(); showToast('🔀 Shuffled!');
}
function useBomb(){
  if(!S.running||S.animating||!spendCoins(ECONOMY.bombCost))return;
  clearSelection();
  const color=S.grid[Math.floor(Math.random()*S.grid.length)];
  let removed=0;
  S.grid.forEach((c,i)=>{if(c===color){S.grid[i]=null;S.frozenTiles.delete(i);S.wildTiles.delete(i);S.bombTiles.delete(i);removed++;}});
  S.score+=removed*20; S.tilesCleared+=removed; showChainBadge(removed,false,true);
  applyGravity(); setTimeout(()=>{refillGrid();updateUI();},250);
  showToast(`💣 Blasted ${removed} tiles! +${removed*20}pts`);
}
function useTime(){
  if(!S.running||!spendCoins(ECONOMY.timeCost))return;
  S.timeLeft=Math.min(S.roundTime,S.timeLeft+8); showToast('⏱️ +8 seconds!');
}
function largestGroup(){
  const vis=new Array(S.grid.length).fill(false); let best=[];
  for(let s=0;s<S.grid.length;s++){
    if(vis[s]||!S.grid[s]||S.frozenTiles.has(s))continue;
    const color=S.grid[s],group=[],q=[s];
    while(q.length){
      const cur=q.shift(); if(vis[cur]||S.grid[cur]!==color)continue;
      vis[cur]=true; group.push(cur);
      const c=cur%S.cols,r=Math.floor(cur/S.cols);
      if(c>0)q.push(cur-1); if(c<S.cols-1)q.push(cur+1);
      if(r>0)q.push(cur-S.cols); if(r<S.rows-1)q.push(cur+S.cols);
    }
    if(group.length>best.length)best=group;
  }
  return best;
}

// SOUND
// ═══════════════════════════════════════════════
let _ctx=null;
function getCtx(){if(!_ctx)try{_ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return _ctx;}
function beep(freq,dur,type='sine',vol=0.1){
  const ctx=getCtx();if(!ctx)return;
  try{
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq,ctx.currentTime);
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(); osc.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playTick(){beep(900,.04,'square',.05);}
function playLifeLostSound(){beep(180,.5,'sawtooth',.1);}
function playLevelUpSound(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18,'sine',.1),i*75));}
function playChainSound(len){const b=[330,392,494,587,698,880,1047,1175];for(let i=0;i<Math.min(len,b.length);i++)setTimeout(()=>beep(b[i],.13,'sine',.09),i*38);}

// ═══════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════
const SCREENS=['startScreen','instrScreen','gameOverScreen','storeScreen',
               'missionsScreen','leaderboardScreen','achScreen','statsScreen',
               'profileScreen','puzzleScreen'];
function showScreen(id){
  const el=document.getElementById(id); if(!el)return;
  el.classList.remove('hidden');
  if(id==='storeScreen'){updateFreeUI();renderThemes();updateDoublerUI();}
  if(id==='achScreen')renderAchievements();
  if(id==='statsScreen')renderStatsScreen();
  if(id==='missionsScreen')updateMissionsUI();
  if(id==='leaderboardScreen'){renderLeaderboard();}
  if(id==='startScreen')updateHomeScreen();
  if(id==='profileScreen')renderProfileScreen();
  if(id==='puzzleScreen'){renderPuzzleScreen();renderPuzzleLeaderboard();}
}
function hideScreen(id){const el=document.getElementById(id);if(el)el.classList.add('hidden');}
function hideAllScreens(){SCREENS.forEach(hideScreen);}
function returnToHome(){hideAllScreens();showScreen('startScreen');}

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();commitChain();}
  if(e.code==='Escape')clearSelection();
});

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
(function boot(){
  updateLoginStreak();
  applyMode();
  applyTheme(S.theme);
  checkChallengeParams();
  checkGiftParams();
  checkReferralParam();
  setInterval(updateDoublerUI,1000);
  updateFreeUI();
  updateHomeScreen();

  // Restore colour blind mode
  const cb=localStorage.getItem('gl_cb')||'off';
  document.getElementById('html').dataset.cb=cb;
  document.getElementById('cbBtn').textContent=cb==='on'?'👁':'👁️';

  // Restore sound state
  if(_soundOff){
    document.getElementById('soundBtn').textContent='🔇';
    document.getElementById('soundBtn').style.borderColor='var(--c1)';
  }

  // Restore speed run mode
  S.speedRun=localStorage.getItem('gl_speedrun')==='1';
  if(S.speedRun){
    document.getElementById('srBtn').style.borderColor='var(--c3)';
    document.getElementById('speedrunBadge').classList.add('show');
  }

  // VIP badge
  if((S.stats.loginStreak||0)>=7 || S.vip) document.getElementById('logoBadge')?.classList.add('show');

  const days=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const el=document.getElementById('dailySubText');
  if(el) el.textContent=`${days[new Date().getDay()]}'S CHALLENGE · SAME FOR EVERYONE`;

  // Load global top score for HUD strip
  (async()=>{
    try{
      const r=await window.storage.get(LB_KEY,true);
      if(r){
        const board=JSON.parse(r.value);
        if(board[0]){
          const strip=document.getElementById('topScoreStrip');
          if(strip){strip.style.display='block';
            document.getElementById('tssName').textContent=board[0].name;
            document.getElementById('tssScore').textContent=(+board[0].score).toLocaleString();
          }
        }
      }
    }catch(e){}
  })();

  // Daily bonus notification badge
  const bonusLast=parseInt(localStorage.getItem('gl_daily_bonus')||'0');
  const bonusReady=new Date(bonusLast).toDateString()!==new Date().toDateString();
  if(bonusReady){
    // Add a small dot badge to the store nav button
    const storeBtn=document.querySelector('.home-nav-btn[onclick*="storeScreen"]');
    if(storeBtn){
      const dot=document.createElement('div');
      dot.style.cssText='position:absolute;top:8px;right:8px;width:8px;height:8px;background:var(--c4);border-radius:50%;';
      storeBtn.style.position='relative';
      storeBtn.appendChild(dot);
    }
  }

  // Greet returning player
  if((S.stats.gamesPlayed||0)>0){
    setTimeout(()=>{
      if((S.stats.loginStreak||0)>=3)
        showToast(`🔥 ${S.stats.loginStreak} day streak! Keep it up!`);
      else if(bonusReady)
        showToast('🎁 Daily bonus ready — visit the store!');
    },800);
  }
})();
</script>
